<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<title>Nexora · Análise de Mercado</title>
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#18181f;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--blue:#4f8ef7;--green:#22c98a;--amber:#f5a623;--red:#f25858;--teal:#2dd4bf;--text:#f0f0f5;--muted:#8888a0;--muted2:#555568}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}
.wrap{max-width:700px;margin:0 auto;padding:0 20px;position:relative;z-index:1}
.tnav{display:flex;align-items:center;gap:8px;padding:20px 0 0;margin-bottom:22px;flex-wrap:wrap}
.cr{font-size:12px;color:var(--muted2);cursor:pointer}.cr:hover{color:var(--muted)}.cr.act{color:var(--teal);font-weight:500}
.sep{font-size:12px;color:var(--muted2)}
header{padding:0 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px}
.lrow{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.limg{height:34px;width:auto;border-radius:5px}
.lsub{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.ptit{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.02em;margin-bottom:3px}
.psub{font-size:13px;color:var(--muted)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:12px}
.clbl{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--muted2);text-transform:uppercase;margin-bottom:12px}
.field{margin-bottom:15px}.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 14px;outline:none;transition:border .2s}
.field input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(45,212,191,.1)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.rg{display:flex;flex-wrap:wrap;gap:6px}
.rb{font-size:12px;font-weight:500;padding:6px 13px;border-radius:8px;border:1px solid var(--border2);cursor:pointer;color:var(--muted);background:transparent;font-family:'DM Sans',sans-serif;transition:all .15s}
.rb:hover{border-color:var(--teal);color:var(--text)}.rb.sel{background:rgba(45,212,191,.1);color:var(--teal);border-color:var(--teal)}
.ctable{width:100%;border-collapse:collapse}
.ctable th{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--muted2);text-transform:uppercase;padding:0 10px 8px 0;text-align:left}
.ctable td{padding:7px 10px 7px 0;font-size:13px;color:var(--text);border-top:1px solid var(--border);vertical-align:middle}
.ctable tr:first-child td{border-top:none}
.ctable input{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;padding:6px 9px;width:100%;outline:none}
.badd{font-size:12px;padding:7px 14px;border-radius:8px;border:1px solid var(--border2);cursor:pointer;color:var(--teal);background:transparent;font-family:'DM Sans',sans-serif;margin-top:8px;transition:all .15s}
.badd:hover{border-color:var(--teal)}
.brm{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:15px;padding:2px 5px}
.brm:hover{color:var(--red)}
.brun{font-size:14px;padding:13px;cursor:pointer;border-radius:10px;color:#fff;background:#0f6e56;border:none;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.04em;transition:opacity .15s;width:100%;margin-top:6px}
.brun:hover{opacity:.88}
.loading{text-align:center;padding:52px 0}
.spinner{width:30px;height:30px;border:2.5px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:13px;color:var(--muted)}
.force-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(45,212,191,.1);border:1px solid rgba(45,212,191,.2);border-radius:10px;padding:10px 16px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--teal);margin-bottom:14px}
.quad-wrap{position:relative;width:100%;aspect-ratio:1;max-width:380px;margin:0 auto 20px;border:1px solid var(--border2);border-radius:12px;background:var(--surface2);overflow:hidden}
.qax-h{position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border2)}
.qax-v{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--border2)}
.qlbl{position:absolute;font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted2)}
.qlbl.tl{top:8px;left:10px}.qlbl.tr{top:8px;right:10px}.qlbl.bl{bottom:8px;left:10px}.qlbl.br{bottom:8px;right:10px}
.qdot{position:absolute;width:10px;height:10px;border-radius:50%;transform:translate(-50%,-50%)}
.qdot.prod{width:14px;height:14px;background:var(--teal);border:2px solid rgba(45,212,191,.4);z-index:2}
.qdot.comp{background:var(--muted2);opacity:.6}
.stat3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:13px}
.stat3-item{background:var(--surface2);border-radius:9px;padding:11px;text-align:center}
.stat3-l{font-size:10px;color:var(--muted2);margin-bottom:3px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.stat3-v{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text)}
.dtxt{font-size:14px;line-height:1.85;color:rgba(240,240,245,.85);white-space:pre-wrap}
.gitem{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;color:rgba(240,240,245,.8);line-height:1.55}
.gitem:last-child{border-bottom:none}
.tag{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px;white-space:nowrap;letter-spacing:.04em;flex-shrink:0;margin-top:1px}
.tcr{background:rgba(242,88,88,.15);color:#f25858}.twn{background:rgba(245,166,35,.15);color:#f5a623}.ttl{background:rgba(45,212,191,.15);color:#2dd4bf}
.ctx-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.ctx-pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.ctx-pill strong{color:var(--text);font-weight:500}
.cdot{width:6px;height:6px;border-radius:50%}
.ra{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;padding-bottom:36px}
.brs{font-size:13px;padding:9px 16px;cursor:pointer;color:var(--muted);background:transparent;border:1px solid var(--border2);border-radius:10px;font-family:'DM Sans',sans-serif}
.badv{font-size:12px;padding:9px 16px;cursor:pointer;color:var(--teal);background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.2);border-radius:10px;font-family:'Syne',sans-serif;font-weight:700}
footer{padding:24px 0;border-top:1px solid var(--border);margin-top:8px}
.ft{font-size:12px;color:var(--muted2);text-align:center}
@media(max-width:520px){.g2,.g3,.stat3{grid-template-columns:1fr}}
</style></head><body>

async function callAI(messages, maxTokens) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: maxTokens || 1200, messages })
  });
  const data = await res.json();
  if (data.error) throw new Error(JSON.stringify(data.error));
  return data.content?.map(c => c.text || '').join('') || '';
}

  if(C1){const s=C1.scores;pills.push('<div class="ctx-pill"><span class="cdot" style="background:'+(s.ctr==='CRÍTICO'||s.ctr==='BAIXO'?'#f25858':'#22c98a')+'"></span>CTR <strong>'+s.ctr+'</strong></div>','<div class="ctx-pill"><span class="cdot" style="background:'+(s.cvr==='CRÍTICO'||s.cvr==='BAIXO'?'#f25858':'#22c98a')+'"></span>CVR <strong>'+s.cvr+'</strong></div>');if(C1.cat)pills.push('<div class="ctx-pill"><strong>'+(C1.sub||C1.cat)+'</strong></div>');}
  if(C2){pills.push('<div class="ctx-pill">CTR-read <strong>'+C2.scores?.ctr_readiness+'/100</strong></div>','<div class="ctx-pill">CVR-read <strong>'+C2.scores?.cvr_readiness+'/100</strong></div>');}
  el.innerHTML=pills.length?'<div class="ctx-pills">'+pills.join('')+'</div>':'<p style="font-size:12px;color:var(--muted2);margin-bottom:16px">Faça os Cérebros 1 e 2 primeiro para análise completa.</p>';
}

function selRb(el,k,val){document.querySelectorAll('[data-k="'+k+'"]').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');rbState[k]=val;}
function addComp(){comps.push({id:++cid,preco:'',reviews:'',rating:'',pos:''});renderComps();}
function remComp(id){comps=comps.filter(c=>c.id!==id);renderComps();}
function upComp(id,f,v){const c=comps.find(c=>c.id===id);if(c)c[f]=v;}
function renderComps(){
  const el = document.getElementById('comp-rows');
  if (!el) return;

  el.innerHTML = comps.map((c, i) =>
    '<tr>' +
      '<td><span style="font-family:Syne,sans-serif;font-size:11px;font-weight:700;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:inline-flex;align-items:center;justify-content:center;color:var(--muted2)">' + (i + 1) + '</span></td>' +
      '<td><input type="number" placeholder="preço" value="' + c.preco + '" oninput="upComp(' + c.id + ',\\'preco\\',this.value)" style="width:80px"></td>' +
      '<td><input type="number" placeholder="reviews" value="' + c.reviews + '" oninput="upComp(' + c.id + ',\\'reviews\\',this.value)" style="width:75px"></td>' +
      '<td><input type="number" placeholder="4.5" step="0.1" value="' + c.rating + '" oninput="upComp(' + c.id + ',\\'rating\\',this.value)" style="width:60px"></td>' +
      '<td><button class="brm" onclick="remComp(' + c.id + ')">×</button></td>' +
    '</tr>'
  ).join('');
}

function renderForm(){
  document.getElementById('app').innerHTML=`
  <div class="card"><p class="clbl">Keyword e contexto</p>
    <div class="field"><label>Keyword principal</label><input type="text" id="f_kw" placeholder="ex: suplemento vitamina c 1000mg"></div>
    <div class="field"><label>Saturação da página de busca</label><div class="rg">${['Baixa','Média','Alta','Muito alta'].map(o=>'<button class="rb'+(rbState.sat===o?' sel':'')+'" data-k="sat" onclick="selRb(this,\'sat\',\''+o+'\')">'+o+'</button>').join('')}</div></div>
    <div class="field"><label>Estilo visual dominante</label><div class="rg">${['Fundo branco','Lifestyle','Infográfico','Embalagem'].map(o=>'<button class="rb'+(rbState.estilo===o?' sel':'')+'" data-k="estilo" onclick="selRb(this,\'estilo\',\''+o+'\')">'+o+'</button>').join('')}</div></div>
  </div>
  <div class="card"><p class="clbl">Top concorrentes</p>
    <table class="ctable"><thead><tr><th>#</th><th>Preço</th><th>Reviews</th><th>Rating</th><th></th></tr></thead><tbody id="comp-rows"></tbody></table>
    <button class="badd" onclick="addComp()">+ Adicionar concorrente</button>
  </div>
  <div class="card"><p class="clbl">Seu produto</p>
    <div class="g3">
      <div class="field"><label>Preço (R$)</label><input type="number" id="f_mp" placeholder="ex: 89.90" value="${C1?.preco||''}"></div>
      <div class="field"><label>Reviews</label><input type="number" id="f_mr" placeholder="0" value="${C1?.rev||''}"></div>
      <div class="field"><label>Posição orgânica</label><input type="number" id="f_mpos" placeholder="ex: 24"></div>
    </div>
    <div class="field"><label>Observações (opcional)</label><input type="text" id="f_obs" placeholder="ex: maioria usa bundle, 2 marcas dominam..."></div>
  </div>
  <button class="brun" onclick="runAnalysis()">Analisar mercado →</button>`;
  renderComps();
}

async function runAnalysis(){
  document.getElementById('app').innerHTML='<div class="loading"><div class="spinner"></div><p>Analisando o mercado competitivo...</p></div>';
  const kw=document.getElementById('f_kw')?.value||'';
  const mp=document.getElementById('f_mp')?.value||'';
  const mr=document.getElementById('f_mr')?.value||'0';
  const mpos=document.getElementById('f_mpos')?.value||'';
  const obs=document.getElementById('f_obs')?.value||'';
  const compData=comps.map((c,i)=>'Concorrente '+(i+1)+': R$'+c.preco+', '+c.reviews+' reviews, '+c.rating+' stars').join('; ');
  const ctx1=C1?'Cérebro 1: '+C1.cat+(C1.sub?'>'+C1.sub:'')+' | CTR '+C1.ctr+'% | CVR '+C1.cvr+'% | Força: '+C1.force:'Sem dados C1.';
  const ctx2=C2?'Cérebro 2: CTR-read '+C2.scores?.ctr_readiness+' | CVR-read '+C2.scores?.cvr_readiness+' | Problema: '+C2.problema_principal:'Sem dados C2.';
  const prompt=ctx1+'\n'+ctx2+`\nKeyword: ${kw} | Saturação: ${rbState.sat||'N/A'} | Estilo: ${rbState.estilo||'N/A'}\nMeu produto: R$${mp}, ${mr} reviews, posição ${mpos||'N/A'}\nConcorrentes: ${compData||'Não informados'}\nObservações: ${obs||'Nenhuma'}
Retorne SOMENTE JSON sem markdown: {"forca_dominante":"","forca_explicacao":"","quadrante":"CATEGORY_LEADER|PREMIUM_BRAND|NICHE_PLAYER|PRICE_FIGHTER","quadrante_explicacao":"","review_barrier":0,"preco_medio":0,"diagnostico":"","riscos":[{"nivel":"CRÍTICO|ALTO|MÉDIO","descricao":""}],"gap_competitivo":"","reposicionamento":"","prioridades":["","",""]}`;
  let result;
  try{
    const raw=await callAI([{role:'user',content:prompt}],1500);
    result=JSON.parse(raw.replace(/```json|```/g,'').trim());
  }catch(e){
    const precos=comps.map(c=>parseFloat(c.preco)||0).filter(v=>v>0);
    const revs=comps.map(c=>parseInt(c.reviews)||0).filter(v=>v>0);
    const pm=precos.length?Math.round(precos.reduce((a,b)=>a+b,0)/precos.length):0;
    const rb=revs.length?Math.round(revs.sort((a,b)=>b-a).slice(0,5).reduce((a,b)=>a+b,0)/Math.min(5,revs.length)):0;
    result={forca_dominante:C1?.force||'REVIEWS',forca_explicacao:'Análise baseada nos dados fornecidos.',quadrante:C1?.pos||'NICHE_PLAYER',quadrante_explicacao:'Posicionamento estimado.',review_barrier:rb,preco_medio:pm,diagnostico:'IA indisponível: '+e.message,riscos:[{nivel:'ALTO',descricao:'Configure a API key no Vercel para análise completa'}],gap_competitivo:'Análise manual necessária.',reposicionamento:'Configure a API key para recomendações.',prioridades:['Configurar API key no Vercel','Adicionar dados de concorrentes','Reexecutar análise']};
  }
  try{localStorage.setItem('nx_c3',JSON.stringify({...result,ts:new Date().toISOString()}));}catch(e){}
  const mp2=parseFloat(document.getElementById('f_mp')?.value)||0;
  const mr2=parseInt(document.getElementById('f_mr')?.value)||0;
  const prPos={CATEGORY_LEADER:{x:65,y:30},PREMIUM_BRAND:{x:72,y:35},NICHE_PLAYER:{x:35,y:32},PRICE_FIGHTER:{x:40,y:68}};
  const pp=prPos[result.quadrante]||{x:50,y:50};
  const compDots=comps.slice(0,8).map(c=>{const pr=result.preco_medio>0?(parseFloat(c.preco)||result.preco_medio)/result.preco_medio:0.5;const rr=result.review_barrier>0?(parseInt(c.reviews)||0)/result.review_barrier:0.3;const x=Math.max(8,Math.min(92,50+(1-pr)*28));const y=Math.max(8,Math.min(92,50-rr*36));return '<div class="qdot comp" style="left:'+x+'%;top:'+y+'%"></div>';}).join('');
  const qlabels={CATEGORY_LEADER:'Category Leader',PREMIUM_BRAND:'Premium Brand',NICHE_PLAYER:'Niche Player',PRICE_FIGHTER:'Price Fighter'};
  const riskTag=n=>n==='CRÍTICO'?'tcr':n==='ALTO'?'twn':'ttl';
  document.getElementById('app').innerHTML=`
    <p style="font-family:Syne,sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--muted2);text-transform:uppercase;margin-bottom:14px">Resultado · Análise de mercado</p>
    <div class="card"><p class="clbl">Força dominante detectada</p>
      <div class="force-badge">${result.forca_dominante}</div>
      <p style="font-size:13px;color:var(--muted);line-height:1.6">${result.forca_explicacao}</p>
    </div>
    <div class="card"><p class="clbl">Quadrante competitivo</p>
      <div class="quad-wrap"><div class="qax-h"></div><div class="qax-v"></div>
        <div class="qlbl tl" style="color:rgba(34,201,138,.5)">PREMIUM</div>
        <div class="qlbl tr" style="color:rgba(34,201,138,.7)">LEADER</div>
        <div class="qlbl bl" style="color:rgba(136,136,160,.4)">NICHE</div>
        <div class="qlbl br" style="color:rgba(245,166,35,.5)">PRICE FIGHTER</div>
        ${compDots}
        <div class="qdot prod" style="left:${pp.x}%;top:${pp.y}%"></div>
      </div>
      <p style="font-family:Syne,sans-serif;font-size:14px;font-weight:700;color:var(--teal);margin-bottom:6px">${qlabels[result.quadrante]||result.quadrante}</p>
      <p style="font-size:13px;color:var(--muted)">${result.quadrante_explicacao}</p>
      <div class="stat3"><div class="stat3-item"><div class="stat3-l">Review barrier</div><div class="stat3-v">${result.review_barrier||'—'}</div></div><div class="stat3-item"><div class="stat3-l">Preço médio</div><div class="stat3-v">${result.preco_medio?'R$'+result.preco_medio:'—'}</div></div><div class="stat3-item"><div class="stat3-l">Saturação</div><div class="stat3-v" style="font-size:12px">${rbState.sat||'—'}</div></div></div>
    </div>
    <div class="card"><p class="clbl">Diagnóstico de mercado</p><div class="dtxt">${result.diagnostico}</div></div>
    <div class="card"><p class="clbl">Riscos estruturais</p>${result.riscos.map(r=>'<div class="gitem"><span class="tag '+riskTag(r.nivel)+'">'+r.nivel+'</span>'+r.descricao+'</div>').join('')}</div>
    <div class="card"><p class="clbl">Gap e reposicionamento</p>
      <p style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px">Gap competitivo</p>
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px">${result.gap_competitivo}</p>
      <p style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px">Reposicionamento</p>
      <p style="font-size:13px;color:var(--muted)">${result.reposicionamento}</p>
    </div>
    <div class="card"><p class="clbl">Prioridades estratégicas</p>${result.prioridades.map((p,i)=>'<div class="gitem"><span class="tag ttl">'+(i+1)+'</span>'+p+'</div>').join('')}</div>
    <div class="ra"><button class="brs" onclick="renderForm()">Nova análise</button><button class="badv" onclick="location.href='sintese.html'">Síntese estratégica →</button></div>`;
}

loadCtx();
renderForm();
</script></body></html>
