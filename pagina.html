<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <title>Nexora · Análise de Página</title>

  <style>
    :root {
      --bg-base: #0b0b0c;
      --bg-overlay-1: rgba(128, 0, 0, 0.45);
      --bg-overlay-2: rgba(111, 29, 29, 0.40);
      --bg-overlay-3: rgba(214, 31, 31, 0.22);

      --surface: rgba(18, 18, 18, 0.88);
      --surface-strong: rgba(24, 24, 31, 0.95);
      --surface-soft: rgba(18, 18, 18, 0.72);

      --border: rgba(255, 255, 255, 0.10);
      --border-soft: rgba(255, 255, 255, 0.14);
      --border-dashed: rgba(255, 255, 255, 0.18);

      --accent: #8b1e1e;
      --accent-soft: rgba(139, 30, 30, 0.18);
      --accent-purple: #7b5cf0;
      --accent-purple-soft: rgba(123, 92, 240, 0.10);
      --accent-purple-border: rgba(123, 92, 240, 0.25);
      --accent-blue: #4f8ef7;

      --green: #22c98a;
      --amber: #f5a623;
      --red: #f25858;

      --text: #ffffff;
      --text-soft: #f0f0f5;
      --text-muted: #e5e4e2;
      --muted: #8888a0;
      --muted2: #555568;

      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 10px;
      --shadow-card: 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-base);
      color: var(--text-soft);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 20%, var(--bg-overlay-1) 0%, transparent 30%),
        radial-gradient(circle at 75% 25%, var(--bg-overlay-2) 0%, transparent 28%),
        radial-gradient(circle at 60% 80%, var(--bg-overlay-3) 0%, transparent 22%),
        linear-gradient(135deg, #0b0b0c 0%, #121212 35%, #1a0000 100%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        rgba(255, 0, 0, 0.00) 0px,
        rgba(255, 0, 0, 0.00) 3px,
        rgba(255, 0, 0, 0.05) 4px,
        rgba(255, 0, 0, 0.00) 7px
      );
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }

    .tnav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 20px 0 0;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .cr,
    .sep,
    .lsub,
    .psub,
    .clbl,
    .cdesc,
    .field label,
    .rb,
    .uz,
    .uz small,
    .uz div,
    p,
    span,
    label {
      color: var(--text-muted);
    }

    .cr {
      font-size: 12px;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .cr:hover {
      color: var(--text-soft);
    }

    .cr.act {
      color: var(--accent-blue);
      font-weight: 500;
    }

    .sep {
      font-size: 12px;
    }

    header {
      padding: 0 0 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .lrow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 7px;
    }

    .limg {
      height: 34px;
      width: auto;
      border-radius: 5px;
    }

    .lsub {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .ptit,
    h1,
    h2,
    h3 {
      color: var(--text);
    }

    .ptit {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 3px;
    }

    .psub {
      font-size: 13px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-card);
    }

    .clbl {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .cdesc {
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .field {
      margin-bottom: 15px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      background: var(--surface-strong);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      resize: vertical;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(79, 142, 247, 0.10);
    }

    .g2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .rg {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .rb {
      font-size: 12px;
      font-weight: 500;
      padding: 6px 13px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      cursor: pointer;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s ease;
    }

    .rb:hover,
    .rb.sel {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--text);
    }

    .uz {
      border: 1.5px dashed var(--border-dashed);
      border-radius: var(--radius-md);
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      background: var(--surface-soft);
    }

    .uz:hover,
    .uz.drag {
      border-color: var(--accent);
      background: rgba(139, 30, 30, 0.08);
    }

    .uz input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .uz-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 3px;
    }

    .uz-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    .prevs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 7px;
      margin-top: 12px;
    }

    .pthumb {
      position: relative;
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border-soft);
    }

    .pthumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .prm {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 17px;
      height: 17px;
      background: rgba(242, 88, 88, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 10px;
      color: #fff;
      border: none;
    }

    .brun {
      font-size: 14px;
      padding: 13px;
      cursor: pointer;
      border-radius: var(--radius-sm);
      color: #fff;
      background: var(--accent-purple);
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: opacity 0.15s ease;
      width: 100%;
      margin-top: 6px;
    }

    .brun:hover {
      opacity: 0.88;
    }

    .loading {
      text-align: center;
      padding: 52px 0;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 2.5px solid var(--border-soft);
      border-top-color: var(--accent-purple);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading p {
      font-size: 13px;
      color: var(--text-muted);
    }

    .sg4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .sc {
      border-radius: 11px;
      padding: 11px 6px;
      text-align: center;
      border: 1px solid transparent;
    }

    .scn {
      font-family: 'Syne', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .scv {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }

    .sct {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 3px;
      display: inline-block;
    }

    .ok {
      background: rgba(34, 201, 138, 0.10);
      border-color: rgba(34, 201, 138, 0.20);
    }

    .ok .scn,
    .ok .sct,
    .ok .scv {
      color: var(--green);
    }

    .ok .sct {
      background: rgba(34, 201, 138, 0.15);
    }

    .wn {
      background: rgba(245, 166, 35, 0.10);
      border-color: rgba(245, 166, 35, 0.20);
    }

    .wn .scn,
    .wn .sct,
    .wn .scv {
      color: var(--amber);
    }

    .wn .sct {
      background: rgba(245, 166, 35, 0.15);
    }

    .cr2 {
      background: rgba(242, 88, 88, 0.10);
      border-color: rgba(242, 88, 88, 0.20);
    }

    .cr2 .scn,
    .cr2 .sct,
    .cr2 .scv {
      color: var(--red);
    }

    .cr2 .sct {
      background: rgba(242, 88, 88, 0.15);
    }

    .dtxt {
      font-size: 14px;
      line-height: 1.85;
      color: rgba(240, 240, 245, 0.85);
      white-space: pre-wrap;
    }

    .gitem {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: rgba(240, 240, 245, 0.80);
      line-height: 1.55;
    }

    .gitem:last-child {
      border-bottom: none;
    }

    .tag {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 6px;
      white-space: nowrap;
      letter-spacing: 0.04em;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .tcr {
      background: rgba(242, 88, 88, 0.15);
      color: var(--red);
    }

    .twn {
      background: rgba(245, 166, 35, 0.15);
      color: var(--amber);
    }

    .tok {
      background: rgba(34, 201, 138, 0.15);
      color: var(--green);
    }

    .tpu {
      background: rgba(123, 92, 240, 0.15);
      color: var(--accent-purple);
    }

    .ra {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
      padding-bottom: 36px;
    }

    .brs {
      font-size: 13px;
      padding: 9px 16px;
      cursor: pointer;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
    }

    .badv {
      font-size: 12px;
      padding: 9px 16px;
      cursor: pointer;
      color: var(--accent-purple);
      background: var(--accent-purple-soft);
      border: 1px solid var(--accent-purple-border);
      border-radius: var(--radius-sm);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
    }

    .ctx-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .ctx-pill {
      background: var(--surface-strong);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .ctx-pill strong {
      color: var(--text);
      font-weight: 500;
    }

    .cdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    footer {
      padding: 24px 0;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }

    .ft {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    @media (max-width: 520px) {
      .g2,
      .sg4 {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

  async function callAI(messages, maxTokens) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 55000);

  try {
    const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          signal: controller.signal,
          body: JSON.stringify({

          })

          throw new Error(
            typeof data?.error === 'string'
              ? data.error
              : JSON.stringify(data?.error || data || { status: res.status })
          );
        }

        return data.content?.map(c => c.text || '').join('') || data.text || data.result || data.output || '';
      } finally {
        clearTimeout(timeout);
      }

    function compressImageDataUrl(dataUrl, maxWidth = 900, quality = 0.72) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const ratio = Math.min(1, maxWidth / img.width);
          const canvas = document.createElement('canvas');
          canvas.width = Math.round(img.width * ratio);
          canvas.height = Math.round(img.height * ratio);

          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      });
    }

              : '#f5a623';
        }

        return v === 'CRÍTICO'
          ? '#f25858'
          : v === 'OK' || v === 'SAUDÁVEL'
            ? '#22c98a'
            : '#f5a623';
      }

      el.innerHTML = `
        <div class="ctx-pills">
          <div class="ctx-pill">
            <span class="cdot" style="background:${dc(s.ctr, 'ctr')}"></span>
            CTR <strong>${s.ctr || 'N/A'}</strong>
          </div>
          <div class="ctx-pill">
            <span class="cdot" style="background:${dc(s.cvr, 'cvr')}"></span>
            CVR <strong>${s.cvr || 'N/A'}</strong>
          </div>
          <div class="ctx-pill">
            <span class="cdot" style="background:${dc(s.acos, 'acos')}"></span>
            ACOS <strong>${s.acos || 'N/A'}</strong>
          </div>
          ${C1.sub || C1.cat ? `<div class="ctx-pill"><strong>${C1.sub || C1.cat}</strong></div>` : ''}
        </div>
      `;
    }

    function selRb(el, k, val) {
      document.querySelectorAll(`[data-k="${k}"]`).forEach(b => b.classList.remove('sel'));
      el.classList.add('sel');
      rbState[k] = val;
    }

    function handleFiles(files) {
      Array.from(files).forEach(f => {
        if (!f.type.startsWith('image/')) return;

        const r = new FileReader();
        r.onload = e => {
          imgs.push({ data: e.target.result, name: f.name });
          renderPrevs();
        };
        r.readAsDataURL(f);
      });
    }

    function renderPrevs() {
      const el = document.getElementById('prevs');
      if (!el) return;

      el.innerHTML = imgs.map((img, i) => `
        <div class="pthumb">
          <img src="${img.data}" alt="${img.name || 'Imagem enviada'}">
          <button class="prm" onclick="imgs.splice(${i}, 1); renderPrevs()">×</button>
        </div>
      `).join('');
    }

    function renderForm() {
      document.getElementById('app').innerHTML = `
        <div class="card">
          <p class="clbl">Imagens da listing</p>
          <p class="cdesc">Upload das screenshots da sua página Amazon — imagem principal, galeria, A+ content.</p>

          <div
            class="uz"
            id="uz"
            ondragover="event.preventDefault();this.classList.add('drag')"
            ondrop="event.preventDefault();this.classList.remove('drag');handleFiles(event.dataTransfer.files)"
            ondragleave="this.classList.remove('drag')"
          >
            <input type="file" accept="image/*" multiple onchange="handleFiles(this.files)">
            <p class="uz-title">Arraste ou clique para selecionar</p>
            <p class="uz-sub">PNG, JPG · múltiplas imagens aceitas</p>
          </div>

          <div class="prevs" id="prevs"></div>
        </div>

        <div class="card">
          <p class="clbl">Conteúdo da listing</p>

          <div class="field">
            <label>Título</label>
            <input type="text" id="f_titulo" placeholder="Cole o título completo...">
          </div>

          <div class="field">
            <label>Bullet points</label>
            <textarea id="f_bullets" placeholder="• Bullet 1&#10;• Bullet 2&#10;• Bullet 3..." style="min-height:80px"></textarea>
          </div>

          <div class="field">
            <label>Descrição / A+ content</label>
            <textarea id="f_desc" placeholder="Cole a descrição ou mensagem principal do A+..." style="min-height:70px"></textarea>
          </div>

          <div class="g2">
            <div class="field">
              <label>Preço (R$)</label>
              <input type="number" id="f_preco" placeholder="ex: 89.90" step="0.01" value="${C1?.preco || ''}">
            </div>
            <div class="field">
              <label>Reviews</label>
              <input type="number" id="f_rev" placeholder="0" value="${C1?.rev || ''}">
            </div>
          </div>

          <div class="g2">
            <div class="field">
              <label>Rating</label>
              <input type="number" id="f_rat" placeholder="ex: 4.3" step="0.1" value="${C1?.rat || ''}">
            </div>
            <div class="field">
              <label>Tem vídeo?</label>
              <div class="rg" style="margin-top:4px">
                ${['Sim', 'Não'].map(o => `
                  <button class="rb${rbState.video === o ? ' sel' : ''}" data-k="video" onclick="selRb(this, 'video', '${o}')">${o}</button>
                `).join('')}
              </div>
            </div>
          </div>

          <div class="field">
            <label>Tem cupom ativo?</label>
            <div class="rg">
              ${['Sim', 'Não'].map(o => `
                <button class="rb${rbState.cupom === o ? ' sel' : ''}" data-k="cupom" onclick="selRb(this, 'cupom', '${o}')">${o}</button>
              `).join('')}
            </div>
          </div>
        </div>

        <button class="brun" onclick="runAnalysis()">Analisar página com IA →</button>
      `;

      renderPrevs();
    }

    function scClass(n) {
      return n >= 75 ? 'ok' : n >= 50 ? 'wn' : 'cr2';
    }

    function scTag(n) {
      return n >= 75 ? 'FORTE' : n >= 50 ? 'MÉDIO' : 'FRACO';
    }

    async function runAnalysis() {
      const titulo = document.getElementById('f_titulo')?.value || '';
      const bullets = document.getElementById('f_bullets')?.value || '';
      const desc = document.getElementById('f_desc')?.value || '';
      const preco = document.getElementById('f_preco')?.value || '';
      const rev = document.getElementById('f_rev')?.value || '0';
      const rat = document.getElementById('f_rat')?.value || '0';

      document.getElementById('app').innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>Analisando sua página...</p>
        </div>
      `;

      const ctx1 = C1
        ? `Cérebro 1: ${C1.cat} > ${C1.sub || 'N/A'} | CTR ${C1.ctr}% (${C1.scores?.ctr}) | CVR ${C1.cvr}% (${C1.scores?.cvr}) | Problema: ${C1.pilares?.[0] || 'N/A'}`
        : 'Sem dados do Cérebro 1.';

      const prompt = `Você é a NEXORA INTELLIGENCE — Cérebro 2: Listing Intelligence Engine. Analise a página dentro do contexto do problema já detectado.
${ctx1}
Listing: Título: ${titulo || 'N/A'} | Bullets: ${bullets || 'N/A'} | Descrição: ${desc || 'N/A'} | Preço: R$${preco} | Reviews: ${rev} | Rating: ${rat} | Vídeo: ${rbState.video || 'N/A'} | Cupom: ${rbState.cupom || 'N/A'} | ${imgs.length} imagem(ns) enviada(s).
${C1?.scores?.ctr === 'CRÍTICO' || C1?.scores?.ctr === 'BAIXO' ? '→ CTR baixo: foque em thumbnail, título e preço percebido.' : ''}
${C1?.scores?.cvr === 'CRÍTICO' || C1?.scores?.cvr === 'BAIXO' ? '→ CVR baixo: foque em clareza, prova social e diferenciação.' : ''}
Retorne SOMENTE JSON válido sem markdown:
{"scores":{"ctr_readiness":0,"cvr_readiness":0,"diferenciacao":0,"confianca":0},"problema_principal":"","diagnostico":"","gaps":[{"nivel":"CRÍTICO","descricao":""}],"prioridades":["","",""]}`;

      const msgContent = [];

      const imagensParaIA = await Promise.all(
        imgs.slice(0, 4).map(img => compressImageDataUrl(img.data))
      );

      imagensParaIA.forEach(dataUrl => {
        const b64 = dataUrl.split(',')[1];
        const mime = dataUrl.split(';')[0].split(':')[1] || 'image/jpeg';
        msgContent.push({
          type: 'image',
          source: {
            type: 'base64',
            media_type: mime,
            data: b64
          }
        });
      });

      msgContent.push({ type: 'text', text: prompt });

      let result;

      try {
        let raw = '';

        try {
          raw = await callAI([{ role: 'user', content: msgContent }], 1500);
        } catch (imageError) {
          console.warn('Falha na IA com imagens. Tentando análise somente com texto.', imageError);
          raw = await callAI([{ role: 'user', content: prompt + '\n\nObservação técnica: as imagens foram enviadas pelo usuário, mas a chamada visual falhou. Faça a análise pelos campos textuais e pelo Cérebro 1.' }], 1500);
        }

        result = JSON.parse(raw.replace(/```json|```/g, '').trim());
      } catch (e) {
        const rv = parseInt(rev, 10) || 0;
        result = {
          scores: {
            ctr_readiness: rv >= 50 ? 65 : rv >= 20 ? 50 : 35,
            cvr_readiness: rv >= 100 ? 65 : rv >= 50 ? 52 : 38,
            diferenciacao: 55,
            confianca: rv >= 100 ? 68 : rv >= 50 ? 52 : 36
          },
          problema_principal: rv < 50
            ? 'Reviews insuficientes para sustentar conversão'
            : 'Análise baseada nos dados fornecidos',
          diagnostico: 'IA indisponível nesta tentativa: ' + e.message,
          gaps: [{ nivel: 'ALTO', descricao: 'A chamada da IA falhou nesta tentativa. Tente com menos imagens ou imagens mais leves.' }],
          prioridades: [
            'Tente novamente com até 4 imagens leves',
            'Confira se o endpoint /api/chat respondeu no console',
            'Preencha todos os campos do formulário'
          ]
        };
      }

      const s = result.scores || {};

     try {
  localStorage.setItem('nx_c2', JSON.stringify({
    ...result,
    ts: new Date().toISOString()
  }));

 sb
  .from('brain_results')
  .insert({
    brain: 'cerebro_2',
    category: C1?.cat || null,
    subcategory: C1?.sub || null,
    input_data: {
      c1: C1,
      listing: {
        titulo,
        bullets,
        desc,
        preco,
        rev,
        rat,
        video: rbState.video || null,
        cupom: rbState.cupom || null,
        imagens_qtd: imgs.length
      }
    },
    result_data: result,
    created_at: new Date().toISOString()
  })
  .then(({ data, error }) => {
    if (error) {
      console.error('Erro ao salvar Cérebro 2 no Supabase:', error);
    } else {
      console.log('Cérebro 2 salvo no Supabase:', data);
    }
  })
  .catch((e) => {
    console.error('Falha geral ao salvar Cérebro 2:', e);
  });

      const gapTag = n => n === 'CRÍTICO' ? 'tcr' : n === 'ALTO' ? 'twn' : 'tpu';

      document.getElementById('app').innerHTML = `
        <p style="font-family:Syne,sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase;margin-bottom:14px">
          Resultado · Análise de página
        </p>

        <div class="sg4">
          <div class="sc ${scClass(s.ctr_readiness)}">
            <div class="scn">CTR-read</div>
            <div class="scv">${s.ctr_readiness}</div>
            <div class="sct">${scTag(s.ctr_readiness)}</div>
          </div>
          <div class="sc ${scClass(s.cvr_readiness)}">
            <div class="scn">CVR-read</div>
            <div class="scv">${s.cvr_readiness}</div>
            <div class="sct">${scTag(s.cvr_readiness)}</div>
          </div>
          <div class="sc ${scClass(s.diferenciacao)}">
            <div class="scn">Diferenc.</div>
            <div class="scv">${s.diferenciacao}</div>
            <div class="sct">${scTag(s.diferenciacao)}</div>
          </div>
          <div class="sc ${scClass(s.confianca)}">
            <div class="scn">Confiança</div>
            <div class="scv">${s.confianca}</div>
            <div class="sct">${scTag(s.confianca)}</div>
          </div>
        </div>

        <div class="card">
          <p class="clbl">Problema principal de página</p>
          <p style="font-size:15px;font-weight:500;color:var(--text);margin-bottom:10px">${result.problema_principal}</p>
          <div class="dtxt">${result.diagnostico}</div>
        </div>

        <div class="card">
          <p class="clbl">Gaps identificados</p>
          ${result.gaps.map(g => `
            <div class="gitem">
              <span class="tag ${gapTag(g.nivel)}">${g.nivel}</span>
              ${g.descricao}
            </div>
          `).join('')}
        </div>

        <div class="card">
          <p class="clbl">Prioridades</p>
          ${result.prioridades.map((p, i) => `
            <div class="gitem">
              <span class="tag tpu">${i + 1}</span>
              ${p}
            </div>
          `).join('')}
        </div>

        <div class="ra">
          <button class="brs" onclick="imgs = []; renderForm()">Nova análise</button>
          <button class="badv" onclick="location.href='mercado.html'">Cérebro 3 — Mercado →</button>
        </div>
      `;
    }

    loadCtx();
    renderForm();
  </script>
</body>
</html>
