<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <title>Nexora · Síntese Estratégica</title>
  <style>
    :root {
      --bg-base: #0b0b0c;
      --bg-overlay-1: rgba(128, 0, 0, 0.45);
      --bg-overlay-2: rgba(111, 29, 29, 0.40);
      --bg-overlay-3: rgba(214, 31, 31, 0.22);

      --surface: rgba(18, 18, 18, 0.88);
      --surface-strong: rgba(24, 24, 31, 0.95);
      --surface-soft: rgba(18, 18, 18, 0.72);

      --border: rgba(255, 255, 255, 0.10);
      --border-soft: rgba(255, 255, 255, 0.14);
      --border-dashed: rgba(255, 255, 255, 0.18);

      --accent: #8b1e1e;
      --accent-soft: rgba(139, 30, 30, 0.18);
      --accent-hover: rgba(139, 30, 30, 0.08);
      --accent-blue: #4f8ef7;
      --accent-gold: #f59e0b;
      --accent-gold-soft: rgba(245, 158, 11, 0.08);
      --accent-gold-border: rgba(245, 158, 11, 0.20);

      --green: #22c98a;
      --amber: #f5a623;
      --red: #f25858;

      --text: #ffffff;
      --text-soft: #f0f0f5;
      --text-muted: #e5e4e2;
      --muted: #8888a0;
      --muted2: #555568;

      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 10px;
      --radius-xs: 8px;
      --shadow-card: 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-base);
      color: var(--text-soft);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 20%, var(--bg-overlay-1) 0%, transparent 30%),
        radial-gradient(circle at 75% 25%, var(--bg-overlay-2) 0%, transparent 28%),
        radial-gradient(circle at 60% 80%, var(--bg-overlay-3) 0%, transparent 22%),
        linear-gradient(135deg, #0b0b0c 0%, #121212 35%, #1a0000 100%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        rgba(255, 0, 0, 0.00) 0px,
        rgba(255, 0, 0, 0.00) 3px,
        rgba(255, 0, 0, 0.05) 4px,
        rgba(255, 0, 0, 0.00) 7px
      );
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }

    .tnav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 20px 0 0;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .cr {
      font-size: 12px;
      color: var(--muted2);
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .cr:hover {
      color: var(--text-muted);
    }

    .cr.act {
      color: var(--accent-blue);
      font-weight: 500;
    }

    .sep {
      font-size: 12px;
      color: var(--muted2);
    }

    header {
      padding: 0 0 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .lrow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 7px;
    }

    .limg {
      height: 34px;
      width: auto;
      border-radius: 5px;
    }

    .lsub,
    .clbl,
    .pilar-n,
    .sname {
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .lsub {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .ptit {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 3px;
    }

    .psub {
      font-size: 13px;
      color: var(--text-muted);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-card);
    }

    .clbl {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted2);
      margin-bottom: 12px;
    }

    .big-score {
      font-family: 'Syne', sans-serif;
      font-size: 52px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }

    .pilar-g {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .pilar {
      border-radius: 11px;
      padding: 13px;
      border: 1px solid transparent;
      background: var(--surface-strong);
    }

    .pilar-n {
      font-size: 9px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .pilar-s {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .pilar-d {
      font-size: 11px;
      margin-top: 2px;
      color: var(--text-muted);
      opacity: 0.85;
    }

    .p-ok {
      background: rgba(34, 201, 138, 0.08);
      border-color: rgba(34, 201, 138, 0.15);
    }

    .p-ok .pilar-n,
    .p-ok .pilar-s {
      color: var(--green);
    }

    .p-wn {
      background: rgba(245, 166, 35, 0.08);
      border-color: rgba(245, 166, 35, 0.15);
    }

    .p-wn .pilar-n,
    .p-wn .pilar-s {
      color: var(--amber);
    }

    .p-cr {
      background: rgba(242, 88, 88, 0.08);
      border-color: rgba(242, 88, 88, 0.15);
    }

    .p-cr .pilar-n,
    .p-cr .pilar-s {
      color: var(--red);
    }

    .dtxt {
      font-size: 14px;
      line-height: 1.85;
      color: rgba(240, 240, 245, 0.85);
      white-space: pre-wrap;
    }

    .aitem {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
    }

    .aitem:last-child {
      border: none;
    }

    .anum {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 800;
      width: 26px;
      height: 26px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .anu {
      background: rgba(242, 88, 88, 0.15);
      color: var(--red);
    }

    .ani {
      background: rgba(245, 166, 35, 0.15);
      color: var(--amber);
    }

    .ane {
      background: rgba(34, 201, 138, 0.15);
      color: var(--green);
    }

    .atit {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .adet {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .aimp {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--accent-gold-soft);
      color: var(--accent-gold);
      margin-top: 4px;
      display: inline-block;
      border: 1px solid var(--accent-gold-border);
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      transition: border 0.15s ease, background 0.15s ease;
    }

    .status-card:hover {
      border-color: var(--border-soft);
      background: var(--accent-hover);
    }

    .status-card.ready {
      border-color: rgba(34, 201, 138, 0.25);
    }

    .sdot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sdot-ok {
      background: var(--green);
    }

    .sdot-no {
      background: var(--red);
    }

    .sname {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }

    .ssub {
      font-size: 11px;
      color: var(--muted2);
      margin-top: 1px;
    }

    .brun {
      font-size: 14px;
      padding: 14px;
      cursor: pointer;
      border-radius: var(--radius-sm);
      color: #fff;
      background: linear-gradient(135deg, #7a1717, #b32626);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      letter-spacing: 0.05em;
      transition: opacity 0.15s ease;
      width: 100%;
      margin-bottom: 10px;
    }

    .brun:hover {
      opacity: 0.9;
    }

    .loading {
      text-align: center;
      padding: 52px 0;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid var(--border-soft);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading p {
      font-size: 13px;
      color: var(--text-muted);
    }

    .ra {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
      padding-bottom: 36px;
    }

    .brs {
      font-size: 13px;
      padding: 9px 16px;
      cursor: pointer;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.15s ease, color 0.15s ease;
    }

    .brs:hover {
      border-color: var(--accent-blue);
      color: var(--text);
    }

    .bgold {
      font-size: 12px;
      padding: 9px 16px;
      cursor: pointer;
      color: var(--accent-blue);
      background: rgba(79, 142, 247, 0.08);
      border: 1px solid rgba(79, 142, 247, 0.20);
      border-radius: var(--radius-sm);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      transition: opacity 0.15s ease;
    }

    .bgold:hover {
      opacity: 0.92;
    }

    footer {
      padding: 24px 0;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }

    .ft {
      font-size: 12px;
      color: var(--muted2);
      text-align: center;
    }

    #btn-gerar-pdf {
      background: linear-gradient(135deg, #7a1717, #b32626) !important;
      color: #fff !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      padding: 14px 20px !important;
      border-radius: 12px !important;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.30);
      display: none;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.03em;
    }

    @media (max-width: 520px) {
      .pilar-g,
      .status-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="tnav">
    <span class="cr" onclick="location.href='index.html'">Início</span><span class="sep">›</span>
    <span class="cr" onclick="location.href='diagnostico.html'">Cérebro 1</span><span class="sep">›</span>
    <span class="cr" onclick="location.href='pagina.html'">Cérebro 2</span><span class="sep">›</span>
    <span class="cr" onclick="location.href='mercado.html'">Cérebro 3</span><span class="sep">›</span>
    <span class="cr act">Síntese</span>
  </div>

  <header>
    <div class="lrow">
      <span class="lsub">Nexora Intelligence · Síntese Final</span>
    </div>
    <p class="ptit">Síntese estratégica</p>
    <p class="psub">Strategy Synthesizer — cruza os 3 cérebros e gera o diagnóstico executivo completo</p>
  </header>

  <div id="app"></div>
  <footer><p class="ft">© 2025 Nexora Intelligence</p></footer>
</div>

<div style="position:fixed;bottom:24px;right:24px;z-index:999;display:flex;gap:12px;">
  <button id="btn-gerar-pdf" onclick="abrirRelatorio()" >
    Gerar PDF
  </button>
</div>

<script>
async function callAI(messages, maxTokens) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: maxTokens || 2000, messages })
  });

  const data = await res.json();
  if (data.error) throw new Error(JSON.stringify(data.error));
  return data.content?.map(c => c.text || '').join('') || '';
}

let C1 = null, C2 = null, C3 = null;
let synthesisResult = null;

try { C1 = JSON.parse(localStorage.getItem('nx_c1') || 'null'); } catch (e) {}
try { C2 = JSON.parse(localStorage.getItem('nx_c2') || 'null'); } catch (e) {}
try { C3 = JSON.parse(localStorage.getItem('nx_c3') || 'null'); } catch (e) {}
try { synthesisResult = JSON.parse(localStorage.getItem('nexora_sintese_result') || 'null'); } catch (e) {}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function normalizeMetricLevel(status) {
  const s = String(status || '').toLowerCase().trim();
  if (["crítico", "critico", "bad", "critical"].includes(s)) return 'bad';
  if (["atenção", "atencao", "warn"].includes(s)) return 'warn';
  if (["ok", "good"].includes(s)) return 'good';
  return 'warn';
}

function getClientName() {
  return C1?.brand || C1?.cliente || C1?.client || 'Cliente não informado';
}

function getProductName() {
  return C1?.asin || C1?.produto || C1?.product || 'Produto não informado';
}

function saveSynthesisResult(result) {
  synthesisResult = result;
  window.result = result;
  localStorage.setItem('nexora_sintese_result', JSON.stringify(result));
  document.getElementById('btn-gerar-pdf').style.display = 'inline-flex';
}

function buildReportPayload(result) {
  return {
    clientName: getClientName(),
    productName: getProductName(),
    reportDate: new Date().toLocaleDateString('pt-BR'),
    deliveryType: 'Plano Estratégico',
    headline: `Score geral de <span class="red">${result?.score_geral ?? '-'}</span><br>com confiança <span class="accent">${result?.confianca ?? 'N/A'}</span>`,
    coverSub: result?.veredicto || 'Síntese estratégica gerada automaticamente pela Nexora.',
    executiveSummary: result?.diagnostico_executivo || 'Diagnóstico executivo não disponível.',
    rootCause: result?.problema_raiz || 'Causa raiz não informada.',
    categorySummary: `A leitura consolidada dos 3 cérebros aponta confiança <strong>${result?.confianca ?? 'N/A'}</strong> e como principal bloqueio <strong>${result?.problema_raiz || 'não identificado'}</strong>.`,
    categoryTags: [
      `Score ${result?.score_geral ?? '-'}`,
      `Confiança ${result?.confianca ?? 'N/A'}`,
      result?.pilares?.atracao?.status ? `Atração ${result.pilares.atracao.status}` : null,
      result?.pilares?.conversao?.status ? `Conversão ${result.pilares.conversao.status}` : null,
      result?.pilares?.mercado?.status ? `Mercado ${result.pilares.mercado.status}` : null,
      result?.pilares?.operacao?.status ? `Operação ${result.pilares.operacao.status}` : null
    ].filter(Boolean),
    nextSteps: Array.isArray(result?.plano_acao) && result.plano_acao.length
      ? result.plano_acao
          .map((item, i) => `${i + 1}. ${item.titulo || 'Ação'} — ${item.detalhe || item.descricao || ''}`)
          .join(' ')
      : (result?.veredicto || 'Sem próximos passos detalhados.'),
    metrics: [
      {
        title: 'Atração',
        score: result?.pilares?.atracao?.status || '-',
        level: normalizeMetricLevel(result?.pilares?.atracao?.status),
        description: result?.pilares?.atracao?.resumo || 'Sem resumo'
      },
      {
        title: 'Conversão',
        score: result?.pilares?.conversao?.status || '-',
        level: normalizeMetricLevel(result?.pilares?.conversao?.status),
        description: result?.pilares?.conversao?.resumo || 'Sem resumo'
      },
      {
        title: 'Mercado',
        score: result?.pilares?.mercado?.status || '-',
        level: normalizeMetricLevel(result?.pilares?.mercado?.status),
        description: result?.pilares?.mercado?.resumo || 'Sem resumo'
      },
      {
        title: 'Operação',
        score: result?.pilares?.operacao?.status || '-',
        level: normalizeMetricLevel(result?.pilares?.operacao?.status),
        description: result?.pilares?.operacao?.resumo || 'Sem resumo'
      }
    ],
    actions: Array.isArray(result?.plano_acao)
      ? result.plano_acao.map((item, index) => ({
          title: item.titulo || `Ação ${index + 1}`,
          description: item.detalhe || item.descricao || item.description || ''
        }))
      : []
  };
}

function renderResult(result) {
  const sc = result.score_geral;
  const scColor = sc >= 70 ? '#22c98a' : sc >= 50 ? '#f5a623' : '#f25858';
  const pClass = (s) => s === 'CRÍTICO' ? 'p-cr' : s === 'ATENÇÃO' ? 'p-wn' : 'p-ok';
  const pLabel = (s) => s === 'CRÍTICO' ? 'Crítico' : s === 'ATENÇÃO' ? 'Atenção' : 'OK';
  const aClass = (p) => p === 'URGENTE' ? 'anu' : p === 'IMPORTANTE' ? 'ani' : 'ane';

  document.getElementById('app').innerHTML = `
    <div class="card" style="border-color:rgba(245,158,11,.2)">
      <p class="clbl">Score geral do produto</p>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px">
        <div><div class="big-score" style="color:${scColor}">${escapeHtml(sc)}</div><div style="font-size:12px;color:var(--muted);margin-top:3px">/ 100 · saúde geral · confiança ${escapeHtml(result.confianca)}</div></div>
        <div style="background:var(--surface2);border-radius:10px;padding:12px 16px;max-width:280px;border-left:3px solid ${scColor}">
          <p style="font-size:10px;font-weight:700;font-family:Syne,sans-serif;letter-spacing:.07em;color:var(--muted2);text-transform:uppercase;margin-bottom:5px">Problema raiz</p>
          <p style="font-size:13px;font-weight:500;color:var(--text)">${escapeHtml(result.problema_raiz)}</p>
        </div>
      </div>
      <p style="font-size:13px;color:var(--muted);font-style:italic">${escapeHtml(result.veredicto)}</p>
    </div>
    <div class="card"><p class="clbl">Status por pilar</p>
      <div class="pilar-g">
        <div class="pilar ${pClass(result.pilares.atracao.status)}"><div class="pilar-n">Atração</div><div class="pilar-s">${pLabel(result.pilares.atracao.status)}</div><div class="pilar-d">${escapeHtml(result.pilares.atracao.resumo)}</div></div>
        <div class="pilar ${pClass(result.pilares.conversao.status)}"><div class="pilar-n">Conversão</div><div class="pilar-s">${pLabel(result.pilares.conversao.status)}</div><div class="pilar-d">${escapeHtml(result.pilares.conversao.resumo)}</div></div>
        <div class="pilar ${pClass(result.pilares.mercado.status)}"><div class="pilar-n">Mercado</div><div class="pilar-s">${pLabel(result.pilares.mercado.status)}</div><div class="pilar-d">${escapeHtml(result.pilares.mercado.resumo)}</div></div>
        <div class="pilar ${pClass(result.pilares.operacao.status)}"><div class="pilar-n">Operação</div><div class="pilar-s">${pLabel(result.pilares.operacao.status)}</div><div class="pilar-d">${escapeHtml(result.pilares.operacao.resumo)}</div></div>
      </div>
    </div>
    <div class="card"><p class="clbl">Diagnóstico executivo completo</p><div class="dtxt">${escapeHtml(result.diagnostico_executivo)}</div></div>
    <div class="card"><p class="clbl">Plano de ação · ordem de prioridade</p>
      ${(result.plano_acao || []).map((a, i) => `
        <div class="aitem">
          <div class="anum ${aClass(a.prioridade)}">${i + 1}</div>
          <div>
            <div class="atit">${escapeHtml(a.titulo)}</div>
            <div class="adet">${escapeHtml(a.detalhe || a.descricao || '')}</div>
            <span class="aimp">${escapeHtml(a.impacto || '')}</span>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="ra"><button class="brs" onclick="render()">Refazer síntese</button><button class="bgold" onclick="resetAll()">Novo diagnóstico completo</button></div>`;

  document.getElementById('btn-gerar-pdf').style.display = 'inline-flex';
}

function render() {
  const h1 = !!C1, h2 = !!C2, h3 = !!C3;
  const status = `<div class="status-grid">
    <div class="status-card ${h1 ? 'ready' : ''}" onclick="location.href='diagnostico.html'"><span class="sdot ${h1 ? 'sdot-ok' : 'sdot-no'}"></span><div><div class="sname">Cérebro 1</div><div class="ssub">${h1 ? (C1.sub || C1.cat || 'Concluído') : 'Não feito'}</div></div></div>
    <div class="status-card ${h2 ? 'ready' : ''}" onclick="location.href='pagina.html'"><span class="sdot ${h2 ? 'sdot-ok' : 'sdot-no'}"></span><div><div class="sname">Cérebro 2</div><div class="ssub">${h2 ? 'Página analisada' : 'Não feito'}</div></div></div>
    <div class="status-card ${h3 ? 'ready' : ''}" onclick="location.href='mercado.html'"><span class="sdot ${h3 ? 'sdot-ok' : 'sdot-no'}"></span><div><div class="sname">Cérebro 3</div><div class="ssub">${h3 ? 'Mercado analisado' : 'Não feito'}</div></div></div>
  </div>`;

  if (!h1) {
    document.getElementById('app').innerHTML = status + `<div class="card" style="text-align:center;padding:32px"><p style="font-family:Syne,sans-serif;font-size:16px;font-weight:700;margin-bottom:8px">Comece pelo Cérebro 1</p><p style="font-size:13px;color:var(--muted);margin-bottom:18px">O Cérebro 1 é a base do diagnóstico.</p><button class="brun" style="width:auto;padding:11px 24px" onclick="location.href='diagnostico.html'">Ir ao Cérebro 1 →</button></div>`;
    document.getElementById('btn-gerar-pdf').style.display = 'none';
    return;
  }

  if (synthesisResult) {
    renderResult(synthesisResult);
    return;
  }

  document.getElementById('app').innerHTML = status + `
    <div class="card" style="border-color:rgba(245,158,11,.15)">
      <p class="clbl">Dados disponíveis</p>
      <p style="font-size:13px;color:var(--muted);line-height:1.8">
        ${h1 ? '✓ Cérebro 1: ' + (C1.sub || C1.cat) + ' · CTR ' + (C1.scores?.ctr ?? '—') + ' · CVR ' + (C1.scores?.cvr ?? '—') : '✗ Cérebro 1 não disponível'}<br>
        ${h2 ? '✓ Cérebro 2: CTR-read ' + (C2.scores?.ctr_readiness ?? '—') + '/100 · CVR-read ' + (C2.scores?.cvr_readiness ?? '—') + '/100' : '✗ Cérebro 2 não disponível (síntese parcial)'}<br>
        ${h3 ? '✓ Cérebro 3: ' + (C3.forca_dominante ?? '—') + ' · ' + (C3.quadrante ?? '—') : '✗ Cérebro 3 não disponível (síntese parcial)'}
      </p>
    </div>
    <button class="brun" onclick="generate()">Gerar síntese estratégica completa</button>`;

  document.getElementById('btn-gerar-pdf').style.display = 'none';
}

async function generate() {
  document.getElementById('btn-gerar-pdf').style.display = 'none';
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div><p>Cruzando os 3 cérebros...</p></div>';

  const prompt = `Você é a NEXORA INTELLIGENCE — Strategy Synthesizer. Cruze todos os dados e gere o diagnóstico executivo final.
CÉREBRO 1: ${C1 ? JSON.stringify({cat:C1.cat,sub:C1.sub,modelo:C1.modelo,force:C1.force,pos:C1.pos,ctr:C1.ctr,cvr:C1.cvr,acos:C1.acos,scores:C1.scores,bm:C1.bm,pilares:C1.pilares,brand:C1.brand,cliente:C1.cliente,asin:C1.asin,produto:C1.produto}) : 'não disponível'}
CÉREBRO 2: ${C2 ? JSON.stringify({scores:C2.scores,problema_principal:C2.problema_principal,gaps:C2.gaps?.slice(0,3)}) : 'não disponível'}
CÉREBRO 3: ${C3 ? JSON.stringify({forca_dominante:C3.forca_dominante,quadrante:C3.quadrante,review_barrier:C3.review_barrier,preco_medio:C3.preco_medio,riscos:C3.riscos?.slice(0,3),gap_competitivo:C3.gap_competitivo}) : 'não disponível'}
Retorne SOMENTE JSON sem markdown:
{"score_geral":75,"confianca":"ALTA|MÉDIA|BAIXA","problema_raiz":"","diagnostico_executivo":"","pilares":{"atracao":{"status":"OK|ATENÇÃO|CRÍTICO","resumo":""},"conversao":{"status":"OK|ATENÇÃO|CRÍTICO","resumo":""},"mercado":{"status":"OK|ATENÇÃO|CRÍTICO","resumo":""},"operacao":{"status":"OK|ATENÇÃO|CRÍTICO","resumo":""}},"plano_acao":[{"prioridade":"URGENTE|IMPORTANTE|ESTRATÉGICO","titulo":"","detalhe":"","impacto":""}],"veredicto":""}`;

  let result;

  try {
    const raw = await callAI([{ role: 'user', content: prompt }], 2000);
    result = JSON.parse(raw.replace(/```json|```/g, '').trim());
  } catch (e) {
    let sc = 70;
    if (C1?.scores?.ctr === 'CRÍTICO') sc -= 15; else if (C1?.scores?.ctr === 'BAIXO') sc -= 8;
    if (C1?.scores?.cvr === 'CRÍTICO') sc -= 15; else if (C1?.scores?.cvr === 'BAIXO') sc -= 8;
    if (C1?.scores?.ops === 'CRÍTICO') sc -= 12;
    if ((C2?.scores?.ctr_readiness ?? 100) < 50) sc -= 8;
    if ((C2?.scores?.cvr_readiness ?? 100) < 50) sc -= 8;
    sc = Math.max(5, Math.min(100, Math.round(sc)));

    result = {
      score_geral: sc,
      confianca: C1 && C2 && C3 ? 'ALTA' : C1 ? 'MÉDIA' : 'BAIXA',
      problema_raiz: Array.isArray(C1?.pilares) ? (C1.pilares[0] || 'Configure a API key para análise completa') : (C1?.problema_raiz || 'Configure a API key para análise completa'),
      diagnostico_executivo: 'IA indisponível: ' + e.message + '\n\nConfigure a variável ANTHROPIC_API_KEY no painel do Vercel em Settings → Environment Variables.',
      pilares: {
        atracao: { status: C1?.scores?.ctr === 'CRÍTICO' ? 'CRÍTICO' : C1?.scores?.ctr === 'BAIXO' ? 'ATENÇÃO' : 'OK', resumo: 'CTR ' + (C1?.ctr || '—') + '%' },
        conversao: { status: C1?.scores?.cvr === 'CRÍTICO' ? 'CRÍTICO' : C1?.scores?.cvr === 'BAIXO' ? 'ATENÇÃO' : 'OK', resumo: 'CVR ' + (C1?.cvr || '—') + '%' },
        mercado: { status: C3?.riscos?.[0]?.nivel === 'CRÍTICO' ? 'CRÍTICO' : 'ATENÇÃO', resumo: C3?.forca_dominante || 'Não analisado' },
        operacao: { status: C1?.scores?.ops || 'OK', resumo: (C1?.fba || '—') + ' · BuyBox: ' + (C1?.bb || '—') }
      },
      plano_acao: [{ prioridade: 'URGENTE', titulo: 'Configurar API key no Vercel', detalhe: 'Vá em Settings → Environment Variables e adicione ANTHROPIC_API_KEY com sua chave sk-ant-...', impacto: 'Ativa diagnóstico completo com IA' }],
      veredicto: 'Configure a API key para obter o veredicto estratégico completo.'
    };
  }

  saveSynthesisResult(result);
  localStorage.setItem('nexora_relatorio_pronto', JSON.stringify(result));
  localStorage.setItem('nexora_relatorio_mapeado', JSON.stringify(buildReportPayload(result)));
  renderResult(result);
}

function abrirRelatorio() {
  const result = synthesisResult || window.result;

  if (!result) {
    alert('Gere a síntese estratégica antes de abrir o relatório.');
    return;
  }

  localStorage.setItem('nexora_sintese_result', JSON.stringify(result));
  localStorage.setItem('nexora_relatorio_pronto', JSON.stringify(result));
  localStorage.setItem('nexora_relatorio_mapeado', JSON.stringify(buildReportPayload(result)));
  window.location.href = '/relatorio/relatorio_v3.html';
}

function resetAll() {
  try {
    ['nx_c1', 'nx_c2', 'nx_c3', 'nexora_sintese_result', 'nexora_relatorio_pronto', 'nexora_relatorio_mapeado'].forEach(k => localStorage.removeItem(k));
  } catch (e) {}
  location.href = 'diagnostico.html';
}

if (synthesisResult) {
  saveSynthesisResult(synthesisResult);
}

render();
</script>
</body>
</html>
