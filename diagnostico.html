<style>

:root {
  --bg:
    radial-gradient(circle at 15% 20%, rgba(128, 0, 0, 0.45) 0%, transparent 30%),
    radial-gradient(circle at 75% 25%, rgba(111, 29, 29, 0.40) 0%, transparent 28%),
    radial-gradient(circle at 60% 80%, rgba(214, 31, 31, 0.22) 0%, transparent 22%),
    linear-gradient(135deg, #0b0b0c 0%, #121212 35%, #1a0000 100%);
  --surface:#111118;
  --surface2:#18181f;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --accent:#4f8ef7;
  --accent2:#7b5cf0;
  --green:#22c98a;
  --amber:#f5a623;
  --red:#f25858;
  --text:#f0f0f5;
  --muted:#8888a0;
  --muted2:#555568;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body{
  background:#0b0b0c;
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 15% 20%, rgba(128, 0, 0, 0.45) 0%, transparent 30%),
    radial-gradient(circle at 75% 25%, rgba(111, 29, 29, 0.40) 0%, transparent 28%),
    radial-gradient(circle at 60% 80%, rgba(214, 31, 31, 0.22) 0%, transparent 22%),
    linear-gradient(135deg, #0b0b0c 0%, #121212 35%, #1a0000 100%);
  pointer-events:none;
  z-index:0;
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  background:
    repeating-linear-gradient(
      90deg,
      rgba(255,0,0,0.00) 0px,
      rgba(255,0,0,0.00) 3px,
      rgba(255,0,0,0.05) 4px,
      rgba(255,0,0,0.00) 7px
    );
  opacity:.35;
  pointer-events:none;
  z-index:0;
}

.bg-glow{
  position:fixed;
  top:-20%;
  left:50%;
  transform:translateX(-50%);
  width:900px;
  height:500px;
  background:radial-gradient(ellipse at center, rgba(79,142,247,0.06) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
}

.wrap{
  max-width:680px;
  margin:0 auto;
  padding:0 20px;
  position:relative;
  z-index:1;
}

header{
  padding:40px 0 32px;
  border-bottom:1px solid var(--border);
}

.logo-row{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-bottom:20px;
}

.logo-img{
  max-width:460px;
  width:100%;
  height:auto;
  display:block;
}

.header-title{
  font-family:'Syne',sans-serif;
  font-size:26px;
  font-weight:800;
  color:var(--text);
  letter-spacing:-.02em;
}

.header-sub{
  font-size:13px;
  color:rgba(229,228,226,0.82);
  margin-top:4px;
}

.progress-wrap{padding:28px 0 0}
.progress-track{display:flex;gap:5px;margin-bottom:10px}
.progress-seg{flex:1;height:3px;border-radius:2px;background:var(--border2);transition:background .3s}
.progress-seg.done{background:var(--green)}
.progress-seg.active{background:var(--accent)}
.progress-label{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;letter-spacing:.1em;color:rgba(229,228,226,0.82);text-transform:uppercase}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin:16px 0}
.card-section{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;color:rgba(229,228,226,0.82);text-transform:uppercase;margin-bottom:16px}

.field{margin-bottom:22px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:500;color:rgba(229,228,226,0.82);margin-bottom:12px;letter-spacing:.02em}
.field input,.field select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 16px;outline:none;transition:border .2s, box-shadow .2s;-webkit-appearance:none;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.12)}
.field select option{background:var(--surface2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

.rgroup{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.rbtn{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:10px 16px;border-radius:10px;border:1px solid var(--border2);cursor:pointer;color:var(--muted);background:transparent;transition:all .15s;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;white-space:nowrap;width:auto;flex:0 0 auto}
.rbtn:hover{border-color:var(--accent);color:var(--text)}
.rbtn.sel{background:rgba(79,142,247,.12);color:var(--accent);border-color:var(--accent)}

.bm-preview{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-top:6px;display:none}
.bm-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.bm-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.bm-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;background:rgba(79,142,247,.15);color:var(--accent);letter-spacing:.05em}
.bm-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.bm-col{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:14px;padding:12px}
.bm-col-lbl{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.bm-col-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;color:var(--text);line-height:1}
.bm-col-sub{
  margin-top:6px;
  font-size:12px;
  color:var(--muted2);
}

.score-sub{margin-top:6px;font-size:12px;color:var(--muted2)}

.nav{display:flex;justify-content:space-between;align-items:center;padding:20px 0 8px;gap:12px;flex-wrap:wrap}
.btn-back{background:transparent;border:1px solid rgba(229,228,226,0.82);color:rgba(229,228,226,0.82);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px 20px;border-radius:12px;cursor:pointer;transition:all .2s ease}
.btn-back:hover{border-color:var(--accent);color:var(--accent)}
.btn-next{background:rgba(79,142,247,.15);border:1px solid rgba(79,142,247,.5);color:rgba(229,228,226,0.92);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;padding:10px 22px;border-radius:12px;cursor:pointer;transition:all .2s ease}
.btn-next:hover{background:rgba(79,142,247,.22);border-color:var(--accent)}

.btn-go:hover{opacity:.88}

.loading{text-align:center;padding:60px 0}
.spinner{width:36px;height:36px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--muted)}

.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.score-card{border-radius:12px;padding:12px 8px;text-align:center;border:1px solid transparent}
.score-name{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.score-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:800}
.sc-ok{background:rgba(34,201,138,.1);border-color:rgba(34,201,138,.2)}
.sc-ok .score-name{color:rgba(34,201,138,.7)}
.sc-ok .score-val{color:var(--green)}
.sc-wn{background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.2)}

.sc-wn .score-val{color:var(--amber)}
.sc-cr{background:rgba(242,88,88,.1);border-color:rgba(242,88,88,.2)}
.sc-cr .score-name{color:rgba(242,88,88,.7)}
.sc-cr .score-val{color:var(--red)}
.sc-nt{background:var(--surface2);border-color:var(--border)}
.sc-nt .score-name{color:var(--muted2)}
.sc-nt .score-val{color:var(--muted)}

.diag-text{font-size:14px;line-height:1.85;color:rgba(240,240,245,.85);white-space:pre-wrap}

.pri-item{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px;color:rgba(240,240,245,.8);line-height:1.55}
.pri-item:last-child{border:none}
.tag{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap;letter-spacing:.05em;flex-shrink:0;margin-top:1px}
.tag-cr{background:rgba(242,88,88,.15);color:var(--red)}
.tag-wn{background:rgba(245,166,35,.15);color:var(--amber)}
.tag-ok{background:rgba(34,201,138,.15);color:var(--green)}
.tag-if{background:rgba(79,142,247,.15);color:var(--accent)}

.result-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn-restart{background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 18px;border-radius:10px;cursor:pointer;transition:all .15s}
.btn-restart:hover{border-color:var(--border);color:var(--text)}
.btn-deepen{background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.25);color:var(--accent);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;padding:9px 18px;border-radius:10px;cursor:pointer;letter-spacing:.04em}

.ai-note{background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.12);border-radius:12px;padding:14px 16px;margin-top:12px;font-size:12px;color:var(--muted);line-height:1.6}
.ai-note a{color:var(--accent);text-decoration:none}

footer{padding:32px 0;border-top:1px solid var(--border);margin-top:40px}
.footer-text{font-size:12px;color:var(--muted2);text-align:center}

@media(max-width:520px){
  .score-grid{grid-template-columns:repeat(3,1fr)}
  .grid2,.grid3{grid-template-columns:1fr}
  .bm-cols{grid-template-columns:1fr}

function scoreCTR(v, bmCtr){
  if(!bmCtr || bmCtr <= 0){
    if(v < 0.3) return ['CRÍTICO','sc-cr'];
    if(v < 0.8) return ['BAIXO','sc-wn'];
    if(v < 2) return ['BOM','sc-ok'];
    return ['FORTE','sc-ok'];
  }

  const ratio = v / bmCtr;

  if(ratio < 0.7) return ['CRÍTICO','sc-cr'];
  if(ratio < 0.95) return ['BAIXO','sc-wn'];
  if(ratio <= 1.2) return ['BOM','sc-ok'];
  return ['FORTE','sc-ok'];
}
  
function scoreCVR(v, bmCvr){
  if(!bmCvr || bmCvr <= 0){
    if(v < 5) return ['CRÍTICO','sc-cr'];
    if(v < 10) return ['BAIXO','sc-wn'];
    if(v < 15) return ['MÉDIO','sc-ok'];
    return ['BOM','sc-ok'];
  }

  const ratio = v / bmCvr;

  if(ratio < 0.75) return ['CRÍTICO','sc-cr'];
  if(ratio < 0.95) return ['BAIXO','sc-wn'];
  if(ratio <= 1.15) return ['MÉDIO','sc-ok'];
  return ['FORTE','sc-ok'];
}
  
function scoreACOS(v, bmAcos){
  if(!bmAcos || bmAcos <= 0){
    if(v > 35) return ['CRÍTICO','sc-cr'];
    if(v > 25) return ['ACEITÁVEL','sc-wn'];
    if(v > 15) return ['BOM','sc-ok'];
    return ['EXCELENTE','sc-ok'];
  }

  const ratio = v / bmAcos;

  if(ratio > 1.3) return ['CRÍTICO','sc-cr'];
  if(ratio > 1.05) return ['ACEITÁVEL','sc-wn'];
  if(ratio >= 0.75) return ['BOM','sc-ok'];
  return ['EXCELENTE','sc-ok'];
}
function scoreTACOS(v){if(v>15)return['ALTO','sc-cr'];if(v>8)return['ACEITÁVEL','sc-wn'];return['SAUDÁVEL','sc-ok'];}
function scoreOps(){const bb=v('bb'),st=v('est');if(bb==='Não tenho'||st==='Zerado')return['CRÍTICO','sc-cr'];if(bb==='Disputada'||st==='Baixo'||v('fba')==='FBM')return['ATENÇÃO','sc-wn'];return['OK','sc-ok'];}

function priorities(){
  const items=[];
  const ctr=n('ctr'),cvr=n('cvr'),acos=n('acos'),tacos=n('tacos'),mg=n('mg');
  const bm = D.benchmark;
  if (!bm) return items;

  if(ctr < bm.avg_ctr * 0.8) items.push({t:'tag-cr',tag:'CRÍTICO',txt:`CTR ${ctr}% abaixo do benchmark da categoria (${bm.avg_ctr}%) — revisar thumbnail, imagem principal e diferenciação visual.`});
  else if(ctr > bm.avg_ctr * 1.2) items.push({t:'tag-wn',tag:'ACIMA DA CATEGORIA',txt:`CTR (${ctr}%) acima do benchmark da categoria (${bm.avg_ctr}%).`});

  if(cvr < bm.avg_cvr * 0.8) items.push({t:'tag-cr',tag:'CRÍTICO',txt:`CVR crítico — oferta fraca ou confiança muito baixa. Revisar copy, reviews e prova social.`});
  else if(cvr > bm.avg_cvr * 1.2) items.push({t:'tag-ok',tag:'ACIMA DA CATEGORIA',txt:`CVR (${cvr}%) acima do benchmark da categoria (${bm.avg_cvr}%).`});

  if(acos > bm.avg_acos * 1.2) items.push({t:'tag-wn',tag:'ACIMA DA CATEGORIA',txt:`ACOS (${acos}%) acima do benchmark da categoria (${bm.avg_acos}%) — otimizar campanhas antes de escalar.`});
  else if(acos <= bm.avg_acos) items.push({t:'tag-ok',tag:'EFICIENTE',txt:`ACOS dentro ou abaixo do benchmark da categoria.`});

  if(v('bb')==='Não tenho') items.push({t:'tag-cr',tag:'CRÍTICO',txt:'BuyBox perdida — sem BuyBox os ADS não funcionam. Resolver imediatamente.'});
  if(v('est')==='Zerado') items.push({t:'tag-cr',tag:'CRÍTICO',txt:'Estoque zerado — ranking em colapso. Reposição urgente.'});
  if(mg <= 0 || (acos >= mg)) items.push({t:'tag-wn',tag:'UNIT ECONOMICS',txt:'ACOS igual ou maior que a margem — produto possivelmente no prejuízo com ads.'});
  if(tacos > 15) items.push({t:'tag-wn',tag:'TACOS',txt:'TACOS alto — ads respondendo por fatia grande da receita. Trabalhar SEO orgânico.'});
  if(v('fba')==='FBM') items.push({t:'tag-if',tag:'LOGÍSTICA',txt:'FBM reduz visibilidade vs FBA. Avaliar migração para ganhar Prime e ranking.'});
  if(!items.length) items.push({t:'tag-ok',tag:'OK',txt:'Métricas dentro dos benchmarks da categoria. Foco em escalar o que funciona.'});

  return items.slice(0,4);
}

function buildPrompt(){
  const ctr = n('ctr'), cvr = n('cvr'), acos = n('acos'), tacos = n('tacos');

const [sCTR, sCTRc] = scoreCTR(ctr, bmCtr);
const [sCVR, sCVRc] = scoreCVR(cvr, bmCvr);
const [sACOS, sACOSc] = scoreACOS(acos, bmAcos);
const [sTACOS, sTACOSc] = scoreTACOS(tacos);
const [sOps, sOpsc] = scoreOps();

Framework Nexora — 5 sistemas: Market Forces, Category Competition, Amazon Algorithm, Operational Structure, Unit Economics.

Gere diagnóstico com:

      {
        role: 'user',
        content: prompt
      }
    ]
  })
});

const out = await res.json();
  
  console.log('Resposta IA:', out);

if (!res.ok) {
  throw new Error(
    typeof out?.error === 'string'
      ? out.error
      : JSON.stringify(out)
  );
}

const txt =
  out?.content?.[0]?.text ||
  out?.text ||
  out?.result ||
  out?.output ||
  '';
  if (txt) {
    diagHTML = `
      <div class="card">
        <p class="card-section">Análise Nexora</p>
        <div class="diag-text">${txt.replace(/\</g,'&lt;').replace(/\n/g,'<br>')}</div>
    `;
  } else {
    aiNote = `<div class="ai-note">Não foi possível gerar a análise completa com IA no momento.</div>`;
  }
} catch (e) {
  console.error('Erro IA:', e);
  aiNote = `<div class="ai-note">${String(e.message || e)}</div>`;
}
const nexoraOutput = {
  cat: D.cat,
  sub: D.sub,
  modelo: D.modelo,
  force: D.force,
  pos: D.pos,

  ctr: n('ctr'),
  cvr: n('cvr'),
  acos: n('acos'),
  tacos: n('tacos'),
  mg: n('mg'),

  imp: v('imp'),
  cli: v('cli'),
  vnd: v('vnd'),
  rev: v('rev'),
  rat: v('rat'),

  fba: v('fba'),
  bb: v('bb'),
  est: v('est'),
  preco: v('preco'),

  bm: bm,
  scores: {
    ctr: sCTR,
    cvr: sCVR,
    acos: sACOS,
    tacos: sTACOS,
    ops: sOps
  },

  pilares: priorities().map(p => p.txt),
 diagnostico_ia: diagHTML || aiNote || '',
  timestamp: new Date().toISOString()
};
  
try {
  const { data: diagData, error: diagError } = await sb
    .from('diagnostics')
    .insert({
  status: 'draft'
})
    .select()
    .single();

  if (!diagError && diagData?.id) {
    nexoraOutput.diagnostic_id = diagData.id;
    localStorage.setItem('nx_diagnostic_id', diagData.id);
    console.log('Diagnostic ID criado:', diagData.id);
  } else {
    console.error('Erro ao criar diagnostics:', diagError);
  }
} catch (e) {
  console.error('Falha ao criar diagnostics:', e);
}
  sb
  .from('brain_results')
  .upsert({
    diagnostic_id: nexoraOutput.diagnostic_id || localStorage.getItem('nx_diagnostic_id') || null,
    brain_code: 'c1',
    brain_name: 'Cérebro 1 - Diagnóstico de Performance',
    score: nexoraOutput?.scores?.ops === 'CRÍTICO' ? 30 : 70,
    result_data: nexoraOutput
  }, { onConflict: 'diagnostic_id,brain_code' })
  .select()
  .single()
  .then(({ data, error }) => {
    if (error) {
      console.error('Erro ao salvar Cérebro 1 no Supabase:', error);
    } else {
      console.log('Cérebro 1 salvo no Supabase:', data);
    }
  })
  .catch((e) => {
    console.error('Falha geral ao salvar Cérebro 1:', e);
  });
  
try {
  localStorage.setItem('nx_c1', JSON.stringify(nexoraOutput));
  console.log('C1 SALVO:', nexoraOutput);
} catch (e) {
  console.error('Erro ao salvar C1:', e);
}
  document.getElementById('app').innerHTML = `
    <div style="padding-top:20px">

      <p style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--muted2);text-transform:uppercase;margin-bottom:14px">
        Diagnóstico · ${D.sub || D.cat || 'produto'}
      </p>

      ${scores}
      ${bmBar}
      ${diagHTML}

      <div class="card">
        <p class="card-section">Prioridades identificadas</p>
        ${pris}
      </div>

      ${aiNote}

      <div class="result-actions">
        <button class="btn-restart" onclick="step=0;D={};render()">Novo diagnóstico</button>
        <button class="btn-next" onclick="window.location.href='pagina.html'">
          Cérebro 2 — Análise de página →
        </button>
      </div>

    </div>
  `;

  updateProgress();
}

render();
</script>
