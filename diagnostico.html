
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora Intelligence — Diagnóstico Amazon</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #18181f;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #4f8ef7;
  --accent2: #7b5cf0;
  --green: #22c98a;
  --amber: #f5a623;
  --red: #f25858;
  --text: #f0f0f5;
  --muted: #8888a0;
  --muted2: #555568;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh;line-height:1.6}

/* NOISE TEXTURE */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}

/* GLOW BG */
.bg-glow{position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse at center, rgba(79,142,247,0.06) 0%, transparent 70%);pointer-events:none;z-index:0}

/* LAYOUT */
.wrap{max-width:680px;margin:0 auto;padding:0 20px;position:relative;z-index:1}

/* HEADER */
header{padding:40px 0 32px;border-bottom:1px solid var(--border)}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:16px;height:16px}
.logo-text{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
.header-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--text);letter-spacing:-.02em}
.header-sub{font-size:13px;color:var(--muted);margin-top:4px}

/* PROGRESS */
.progress-wrap{padding:28px 0 0}
.progress-track{display:flex;gap:5px;margin-bottom:10px}
.progress-seg{flex:1;height:3px;border-radius:2px;background:var(--border2);transition:background .3s}
.progress-seg.done{background:var(--green)}
.progress-seg.active{background:var(--accent)}
.progress-label{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin:16px 0}
.card-section{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--muted2);text-transform:uppercase;margin-bottom:16px}

/* FIELDS */
.field{margin-bottom:22px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:12px;letter-spacing:.02em}
.field input,.field select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 16px;outline:none;transition:border .2s,box-shadow .2s;-webkit-appearance:none;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.12)}
.field select option{background:var(--surface2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* RADIO BUTTONS */
.rgroup{display:flex;flex-wrap:wrap;gap:7px}
.rbtn{font-size:12px;font-weight:500;padding:7px 14px;border-radius:8px;border:1px solid var(--border2);cursor:pointer;color:var(--muted);background:transparent;transition:all .15s;font-family:'DM Sans',sans-serif}
.rbtn:hover{border-color:var(--accent);color:var(--text)}
.rbtn.sel{background:rgba(79,142,247,.12);color:var(--accent);border-color:var(--accent)}

/* BENCHMARK PREVIEW */
.bm-preview{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-top:6px;display:none}
.bm-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.bm-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.bm-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;background:rgba(79,142,247,.15);color:var(--accent);letter-spacing:.05em}
.bm-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.bm-col{text-align:center}
.bm-col-lbl{font-size:10px;color:var(--muted2);margin-bottom:3px;letter-spacing:.04em}
.bm-col-val{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--text)}
.bm-col-sub{font-size:10px;color:var(--muted2);margin-top:1px}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;padding:20px 0 8px}
.btn-back{background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px 20px;border-radius:10px;cursor:pointer;transition:all .15s}
.btn-back:hover{border-color:var(--border);color:var(--text)}
.btn-next{background:rgba(79,142,247,.15);border:1px solid rgba(79,142,247,.3);color:var(--accent);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;padding:10px 22px;border-radius:10px;cursor:pointer;letter-spacing:.04em;transition:all .15s}
.btn-next:hover{background:rgba(79,142,247,.22);border-color:var(--accent)}
.btn-go{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;padding:12px 28px;border-radius:10px;cursor:pointer;letter-spacing:.05em;transition:opacity .15s}
.btn-go:hover{opacity:.88}

/* LOADING */
.loading{text-align:center;padding:60px 0}
.spinner{width:36px;height:36px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--muted)}

/* SCORES */
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.score-card{border-radius:12px;padding:12px 8px;text-align:center;border:1px solid transparent}
.score-name{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.score-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:800}
.sc-ok{background:rgba(34,201,138,.1);border-color:rgba(34,201,138,.2)}
.sc-ok .score-name{color:rgba(34,201,138,.7)}
.sc-ok .score-val{color:var(--green)}
.sc-wn{background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.2)}
.sc-wn .score-name{color:rgba(245,166,35,.7)}
.sc-wn .score-val{color:var(--amber)}
.sc-cr{background:rgba(242,88,88,.1);border-color:rgba(242,88,88,.2)}
.sc-cr .score-name{color:rgba(242,88,88,.7)}
.sc-cr .score-val{color:var(--red)}
.sc-nt{background:var(--surface2);border-color:var(--border)}
.sc-nt .score-name{color:var(--muted2)}
.sc-nt .score-val{color:var(--muted)}

/* DIAGNOSIS */
.diag-text{font-size:14px;line-height:1.85;color:rgba(240,240,245,.85);white-space:pre-wrap}

/* PRIORITY ITEMS */
.pri-item{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px;color:rgba(240,240,245,.8);line-height:1.55}
.pri-item:last-child{border:none}
.tag{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap;letter-spacing:.05em;flex-shrink:0;margin-top:1px}
.tag-cr{background:rgba(242,88,88,.15);color:var(--red)}
.tag-wn{background:rgba(245,166,35,.15);color:var(--amber)}
.tag-ok{background:rgba(34,201,138,.15);color:var(--green)}
.tag-if{background:rgba(79,142,247,.15);color:var(--accent)}

/* RESULT ACTIONS */
.result-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn-restart{background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 18px;border-radius:10px;cursor:pointer;transition:all .15s}
.btn-restart:hover{border-color:var(--border);color:var(--text)}
.btn-deepen{background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.25);color:var(--accent);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;padding:9px 18px;border-radius:10px;cursor:pointer;letter-spacing:.04em}

/* AI NOTE */
.ai-note{background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.12);border-radius:12px;padding:14px 16px;margin-top:12px;font-size:12px;color:var(--muted);line-height:1.6}
.ai-note a{color:var(--accent);text-decoration:none}

/* FOOTER */
footer{padding:32px 0;border-top:1px solid var(--border);margin-top:40px}
.footer-text{font-size:12px;color:var(--muted2);text-align:center}

@media(max-width:520px){
  .score-grid{grid-template-columns:repeat(3,1fr)}
  .grid2,.grid3{grid-template-columns:1fr}
  .bm-cols{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>

const STEPS=[
  {id:'ctx',label:'Etapa 1 · Contexto de mercado'},
  {id:'atr',label:'Etapa 2 · Atração & tráfego'},
  {id:'cvr',label:'Etapa 3 · Conversão'},
  {id:'ppc',label:'Etapa 4 · PPC & rentabilidade'},
  {id:'ops',label:'Etapa 5 · Operação & logística'},
];

let step=0,D={};
const v=k=>D[k]||'',n=k=>parseFloat(D[k])||0;

function getBM(cat,sub){
  const c=BM[cat];
  if(!c)return{ctr:0.8,cvr:12,acos:25,source:'universal'};
  if(sub&&c._subcats&&c._subcats[sub])return{...c._subcats[sub],source:'subcategoria'};
  return{...c._avg,source:'categoria'};
}

function updateProgress(){
  const track=document.getElementById('progress-track');
  const lbl=document.getElementById('progress-label');
  if(!track)return;
  track.innerHTML=STEPS.map((_,i)=>`<div class="progress-seg ${i<step?'done':i===step?'active':''}"></div>`).join('');
  lbl.textContent=STEPS[step].label;
}

function selRadio(el,k,val){
  document.querySelectorAll('[data-k="'+k+'"]').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');D[k]=val;
}

function updateSubcats(){
  const cat=document.getElementById('f_cat')?.value;
  const subEl=document.getElementById('f_sub');
  if(!subEl||!cat)return;
  D.cat=cat;
  const subs=SUBCATS[cat]||[];
  subEl.innerHTML='<option value="">Selecione a subcategoria...</option>'+subs.map(s=>`<option value="${s}">${s}</option>`).join('');
  if(D.sub)subEl.value=D.sub;
  updateBMPreview();
}

function updateBMPreview(){
  const cat=document.getElementById('f_cat')?.value||'';
  const sub=document.getElementById('f_sub')?.value||'';
  if(sub)D.sub=sub;
  const bm=getBM(cat,sub);
  const el=document.getElementById('bm-preview');
  if(!el||!cat)return;
  el.style.display='block';
  document.getElementById('bm-src').textContent=bm.source==='subcategoria'?sub:bm.source==='categoria'?'média da categoria':'universal';
  document.getElementById('bm-ctr').textContent=bm.ctr.toFixed(2)+'%';
  document.getElementById('bm-cvr').textContent=bm.cvr.toFixed(1)+'%';
  document.getElementById('bm-acos').textContent=bm.acos.toFixed(1)+'%';
}

function saveInputs(){
  document.querySelectorAll('input[id^="f_"],select[id^="f_"]').forEach(el=>{
    const k=el.id.slice(2);
    D[k]=el.value;
  });
}

function scoreCTR(v){if(v<0.3)return['CRÍTICO','sc-cr'];if(v<0.8)return['BAIXO','sc-wn'];if(v<2)return['BOM','sc-ok'];return['FORTE','sc-ok'];}
function scoreCVR(v){if(v<5)return['CRÍTICO','sc-cr'];if(v<10)return['BAIXO','sc-wn'];if(v<15)return['MÉDIO','sc-ok'];return['BOM','sc-ok'];}
function scoreACOS(v){if(v>35)return['CRÍTICO','sc-cr'];if(v>25)return['ACEITÁVEL','sc-wn'];if(v>15)return['BOM','sc-ok'];return['EXCELENTE','sc-ok'];}
function scoreTACOS(v){if(v>15)return['ALTO','sc-cr'];if(v>8)return['ACEITÁVEL','sc-wn'];return['SAUDÁVEL','sc-ok'];}
function scoreOps(){const bb=v('bb'),st=v('est');if(bb==='Não tenho'||st==='Zerado')return['CRÍTICO','sc-cr'];if(bb==='Disputada'||st==='Baixo'||v('fba')==='FBM')return['ATENÇÃO','sc-wn'];return['OK','sc-ok'];}

function priorities(){
  const items=[];
  const ctr=n('ctr'),cvr=n('cvr'),acos=n('acos'),tacos=n('tacos'),mg=n('mg');
  const bm=getBM(D.cat,D.sub);
  if(ctr<0.3)items.push({t:'tag-cr',tag:'CRÍTICO',txt:'CTR crítico — imagem principal e diferenciação visual são prioridade máxima.'});
  else if(ctr>0&&ctr<bm.ctr*0.8)items.push({t:'tag-wn',tag:'ABAIXO DA CATEGORIA',txt:`CTR (${ctr}%) abaixo do benchmark da categoria (${bm.ctr}%) — revisar thumbnail e preço relativo.`});
  if(cvr<5)items.push({t:'tag-cr',tag:'CRÍTICO',txt:'CVR crítico — oferta fraca ou confiança muito baixa. Revisar copy, reviews e prova social.'});
  else if(cvr>0&&cvr<bm.cvr*0.8)items.push({t:'tag-wn',tag:'ABAIXO DA CATEGORIA',txt:`CVR (${cvr}%) abaixo do benchmark (${bm.cvr}%) — avaliar diferenciação de oferta e qualidade de reviews.`});
  if(acos>35)items.push({t:'tag-cr',tag:'CRÍTICO',txt:'ACOS crítico — PPC consumindo margem. Pausar keywords de baixo CVR e revisar bids.'});
  else if(acos>0&&acos>bm.acos*1.2)items.push({t:'tag-wn',tag:'ACIMA DA CATEGORIA',txt:`ACOS (${acos}%) acima do benchmark da categoria (${bm.acos}%) — otimizar campanhas antes de escalar.`});
  if(v('bb')==='Não tenho')items.push({t:'tag-cr',tag:'CRÍTICO',txt:'BuyBox perdida — sem BuyBox os ADS não funcionam. Resolver imediatamente.'});
  if(v('est')==='Zerado')items.push({t:'tag-cr',tag:'CRÍTICO',txt:'Estoque zerado — ranking em colapso. Reposição urgente.'});
  if(mg>0&&acos>0&&acos>=mg)items.push({t:'tag-wn',tag:'UNIT ECONOMICS',txt:'ACOS igual ou maior que a margem — produto possivelmente no prejuízo com ads.'});
  if(tacos>15)items.push({t:'tag-wn',tag:'TACOS',txt:'TACOS alto — ads respondendo por fatia grande da receita. Trabalhar SEO orgânico.'});
  if(v('fba')==='FBM')items.push({t:'tag-if',tag:'LOGÍSTICA',txt:'FBM reduz visibilidade vs FBA. Avaliar migração para ganhar Prime e ranking.'});
  if(!items.length)items.push({t:'tag-ok',tag:'OK',txt:'Métricas dentro dos benchmarks da categoria. Foco em escalar o que funciona.'});
  return items.slice(0,4);
}

function buildPrompt(){
  const ctr=n('ctr'),cvr=n('cvr'),acos=n('acos'),tacos=n('tacos');
  const bm=getBM(D.cat,D.sub);
  const [sCTR]=scoreCTR(ctr),[sCVR]=scoreCVR(cvr),[sACOS]=scoreACOS(acos),[sTACOS]=scoreTACOS(tacos);
  return `Você é a NEXORA INTELLIGENCE — sistema de diagnóstico sistêmico de Amazon criado por um especialista.

BENCHMARKS REAIS DA CATEGORIA (dados Nexora validados):
- Categoria: ${D.cat} | Subcategoria: ${D.sub||'não informada'}
- Benchmark CTR: ${bm.ctr}% | CVR: ${bm.cvr}% | ACOS: ${bm.acos}% (fonte: ${bm.source})

DADOS DO PRODUTO:
- Modelo: ${v('modelo')} | Força dominante: ${v('force')} | Posicionamento: ${v('pos')}
- Impressões: ${v('imp')} | Cliques: ${v('cli')} | CTR: ${ctr}% (${sCTR} vs benchmark ${bm.ctr}%)
- Vendas: ${v('vnd')} | CVR: ${cvr}% (${sCVR} vs benchmark ${bm.cvr}%) | Reviews: ${v('rev')} | Rating: ${v('rat')}
- ACOS: ${acos}% (${sACOS} vs benchmark ${bm.acos}%) | TACOS: ${tacos}% (${sTACOS}) | Margem: ${n('mg')}%
- FBA/FBM: ${v('fba')} | BuyBox: ${v('bb')} | Estoque: ${v('est')} | Preço: R$ ${v('preco')}

Framework Nexora — 5 sistemas: Market Forces, Category Competition, Amazon Algorithm, Operational Structure, Unit Economics.
Regra mais importante: nunca diagnosticar só pelo sintoma — encontrar causa raiz.

Gere diagnóstico com:
1. DIAGNÓSTICO GERAL (2-3 frases diretas comparando com benchmark da categoria)
2. GARGALO PRINCIPAL (causa raiz identificada)
3. ANÁLISE DOS 5 SISTEMAS (1-2 frases cada)
4. TOP 3 AÇÕES PRIORITÁRIAS (numeradas, impacto esperado)

Tom: especialista em Amazon, direto, técnico. Máximo 380 palavras.`;
}

      <div class="grid2">
        <div class="field"><label>Vendas (unidades)</label><input type="number" id="f_vnd" placeholder="0" value="${v('vnd')}"></div>
        <div class="field"><label>CVR (%)</label><input type="number" id="f_cvr" placeholder="ex: 8.5" step="0.01" value="${v('cvr')}"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Número de reviews</label><input type="number" id="f_rev" placeholder="0" value="${v('rev')}"></div>
        <div class="field"><label>Rating médio</label><input type="number" id="f_rat" placeholder="ex: 4.3" step="0.1" value="${v('rat')}"></div>
      </div>
    </div>`;
  }
  if(step===3){
    html=`<div class="card">
      <p class="card-section">PPC & rentabilidade</p>
      <div class="grid3">
        <div class="field"><label>ACOS (%)</label><input type="number" id="f_acos" placeholder="ex: 28" step="0.1" value="${v('acos')}"></div>
        <div class="field"><label>TACOS (%)</label><input type="number" id="f_tacos" placeholder="ex: 12" step="0.1" value="${v('tacos')}"></div>
        <div class="field"><label>Margem bruta (%)</label><input type="number" id="f_mg" placeholder="ex: 35" value="${v('mg')}"></div>
      </div>
    </div>`;
  }
  if(step===4){
    html=`<div class="card">
      <p class="card-section">Operação & logística</p>
      <div class="field"><label>Fulfillment</label>
        <div class="rgroup">${['FBA','FBM','Ambos'].map(o=>`<button class="rbtn${D.fba===o?' sel':''}" data-k="fba" onclick="selRadio(this,'fba','${o}')">${o}</button>`).join('')}</div>
      </div>
      <div class="field"><label>BuyBox</label>
        <div class="rgroup">${['Sim, tenho','Disputada','Não tenho'].map(o=>`<button class="rbtn${D.bb===o?' sel':''}" data-k="bb" onclick="selRadio(this,'bb','${o}')">${o}</button>`).join('')}</div>
      </div>
      <div class="field"><label>Status de estoque</label>
        <div class="rgroup">${['Saudável','Baixo','Zerado'].map(o=>`<button class="rbtn${D.est===o?' sel':''}" data-k="est" onclick="selRadio(this,'est','${o}')">${o}</button>`).join('')}</div>
      </div>
      <div class="field"><label>Preço de venda (R$)</label><input type="number" id="f_preco" placeholder="ex: 89.90" step="0.01" value="${v('preco')}"></div>
    </div>`;
  }

  const isLast=step===STEPS.length-1;
  html+=`<div class="nav">
    ${step>0?`<button class="btn-back" onclick="goBack()">← Voltar</button>`:'<span></span>'}
    ${isLast?`<button class="btn-go" onclick="runDiag()">Gerar diagnóstico</button>`:`<button class="btn-next" onclick="goNext()">Continuar →</button>`}
  </div>`;

  app.innerHTML=html;
  if(step===0&&D.cat)updateSubcats();
}

function goNext(){saveInputs();step++;render();}
function goBack(){saveInputs();step--;render();}

async function runDiag(){
  saveInputs();
  const ctr=n('ctr'),cvr=n('cvr'),acos=n('acos'),tacos=n('tacos');
  const bm=getBM(D.cat,D.sub);
  const [sCTR,sCTRc]=scoreCTR(ctr),[sCVR,sCVRc]=scoreCVR(cvr);
  const [sACOS,sACOSc]=scoreACOS(acos),[sTACOS,sTACOSc]=scoreTACOS(tacos);
  const [sOps,sOpsc]=scoreOps();

  document.getElementById('app').innerHTML=`<div class="loading"><div class="spinner"></div><p class="loading-text">Analisando com benchmarks reais de ${D.cat||'sua categoria'}...</p></div>`;

  const scores=`<div class="score-grid">
    <div class="score-card ${sCTRc}"><div class="score-name">CTR</div><div class="score-val">${sCTR}</div></div>
    <div class="score-card ${sCVRc}"><div class="score-name">CVR</div><div class="score-val">${sCVR}</div></div>
    <div class="score-card ${sACOSc}"><div class="score-name">ACOS</div><div class="score-val">${sACOS}</div></div>
    <div class="score-card ${sTACOSc}"><div class="score-name">TACOS</div><div class="score-val">${sTACOS}</div></div>
    <div class="score-card ${sOpsc}"><div class="score-name">OPERAÇÃO</div><div class="score-val">${sOps}</div></div>
  </div>`;

  const bmBar=`<div class="bm-preview" style="display:block;margin-bottom:16px">
    <div class="bm-row">
      <span class="bm-title">Benchmark Nexora · ${D.sub||D.cat||'categoria'}</span>
      <span class="bm-badge">${bm.source}</span>
    </div>
    <div class="bm-cols">
      <div class="bm-col"><div class="bm-col-lbl">CTR REF.</div><div class="bm-col-val">${bm.ctr.toFixed(2)}%</div><div class="bm-col-sub">seu: ${ctr.toFixed(2)}%</div></div>
      <div class="bm-col"><div class="bm-col-lbl">CVR REF.</div><div class="bm-col-val">${bm.cvr.toFixed(1)}%</div><div class="bm-col-sub">seu: ${cvr.toFixed(1)}%</div></div>
      <div class="bm-col"><div class="bm-col-lbl">ACOS REF.</div><div class="bm-col-val">${bm.acos.toFixed(1)}%</div><div class="bm-col-sub">seu: ${acos.toFixed(1)}%</div></div>
    </div>
  </div>`;

 const pris = priorities().map(p=>`<div class="pri-item"><span class="tag ${p.t}">${p.tag}</span>${p.txt}</div>`).join('');

diagHTML = '';
aiNote = '';

try {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: buildPrompt() }]
    })
  });

  const data = await res.json();

  if (res.ok) {
    const txt = (data.content || []).map(c => c.text || '').join('') || '';
    if (txt) {
      diagHTML = `<div class="card"><p class="card-section">Análise Nexora</p><div class="diag-text">${txt.replace(/\</g,'&lt;')}</div></div>`;
    }
  } else {
    aiNote = `<div class="ai-note">Não foi possível gerar a análise completa com IA no momento.</div>`;
  }

} catch (e) {
  aiNote = `<div class="ai-note">Não foi possível gerar a análise completa com IA no momento.</div>`;
}

  // Save Cérebro 1 output to localStorage for Cérebro 2 and 3
  const nexoraOutput = {
    cat: D.cat, sub: D.sub, modelo: D.modelo, force: D.force, pos: D.pos,
    ctr: n('ctr'), cvr: n('cvr'), acos: n('acos'), tacos: n('tacos'), mg: n('mg'),
    imp: v('imp'), cli: v('cli'), vnd: v('vnd'), rev: v('rev'), rat: v('rat'),
    fba: v('fba'), bb: v('bb'), est: v('est'), preco: v('preco'),
    bm: bm,
    scores: {ctr:sCTR, cvr:sCVR, acos:sACOS, tacos:sTACOS, ops:sOps},
    pilares: priorities().map(p=>p.txt),
    timestamp: new Date().toISOString()
  };
  try {
  if (nexoraOutput && Object.keys(nexoraOutput).length > 0) {
    console.log('SALVANDO C1:', nexoraOutput);
    localStorage.setItem('nx_c1', JSON.stringify(nexoraOutput));
  } else {
    console.warn('C1 NÃO SALVO: objeto vazio');
  }
} catch (e) {
  console.error('Erro ao salvar C1', e);
}

  document.getElementById('app').innerHTML=`
    <div style="padding-top:20px">
      <p style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--muted2);text-transform:uppercase;margin-bottom:14px">Diagnóstico · ${D.sub||D.cat||'produto'}</p>
      ${scores}
      ${bmBar}
      ${diagHTML}
      <div class="card"><p class="card-section">Prioridades identificadas</p>${pris}</div>
      ${aiNote}
      <div class="result-actions">
        <button class="btn-restart" onclick="step=0;D={};render()">Novo diagnóstico</button>
        <button class="btn-next" onclick="window.location.href='pagina.html'" style="text-decoration:none">Cérebro 2 — Análise de página →</button>
      </div>
    </div>`;
  updateProgress();
}

render();
</script>
</body>
</html>
