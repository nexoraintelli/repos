<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<title>Nexora Intelligence — Relatório</title>

<style>
/* ===== RESET ===== */
*{box-sizing:border-box;margin:0;padding:0}

/* ===== VARIABLES (PADRÃO NEXORA) ===== */
:root{
  --bg:#0b0b0c;
  --surface:#111118;
  --surface2:#18181f;

  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.14);

  --accent:#7b5cf0;
  --accent-soft:rgba(123,92,240,.12);

  --red:#f25858;
  --green:#22c98a;
  --amber:#f5a623;

  --text:#f0f0f5;
  --muted:#8888a0;
}

/* ===== BASE ===== */
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  padding:24px 0 60px;
}

/* background Nexora */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 15% 20%, rgba(128,0,0,0.45), transparent 30%),
    radial-gradient(circle at 75% 25%, rgba(111,29,29,0.40), transparent 28%),
    radial-gradient(circle at 60% 80%, rgba(214,31,31,0.22), transparent 22%);
  z-index:0;
}

/* ===== LAYOUT ===== */
.layout{
  width:min(1200px, calc(100vw - 40px));
  margin:auto;
  position:relative;
  z-index:1;
}

.report{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
}

/* ===== TOPBAR ===== */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:18px 24px;
  border-bottom:1px solid var(--border);
}

/* ===== COVER ===== */
.cover{
  padding:40px;
  border-bottom:1px solid var(--border);
}

h1{
  font-family:'Syne';
  font-size:42px;
  line-height:1.1;
  margin-bottom:16px;
}

.accent{color:var(--accent)}
.red{color:var(--red)}

.cover-sub{
  color:var(--muted);
  font-size:16px;
}

/* ===== CONTENT ===== */
.content{
  padding:32px;
  display:grid;
  gap:28px;
}

/* ===== CARD ===== */
.card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px;
}

/* ===== METRICS ===== */
.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.metric{
  padding:16px;
  border-radius:12px;
  border:1px solid var(--border);
}

.metric h3{
  font-family:'Syne';
  font-size:14px;
  margin-bottom:8px;
}

.score{
  font-size:28px;
  font-family:'Syne';
}

.good{color:var(--green)}
.warn{color:var(--amber)}
.bad{color:var(--red)}

/* ===== ACTION ===== */
.action{
  display:flex;
  gap:12px;
  margin-bottom:10px;
}

.action-num{
  width:28px;
  height:28px;
  border-radius:8px;
  background:var(--accent-soft);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Syne';
}

button{
  background:var(--accent);
  border:none;
  padding:12px 16px;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="layout">
<div class="report">

<div class="topbar">
  <strong>NEXORA RELATÓRIO</strong>
  <button onclick="window.print()">Gerar PDF</button>
</div>

<div class="cover">
  <h1 id="headline"></h1>
  <p class="cover-sub" id="sub"></p>
</div>

<div class="content">

<div class="card">
  <h3>Resumo Executivo</h3>
  <p id="summary"></p>
</div>

<div class="card">
  <h3>Métricas</h3>
  <div class="grid-2" id="metrics"></div>
</div>

<div class="card">
  <h3>Causa Raiz</h3>
  <p id="root"></p>
</div>

<div class="card">
  <h3>Plano de Ação</h3>
  <div id="actions"></div>
</div>

</div>
</div>
</div>

<script>
const data = JSON.parse(localStorage.getItem("nexora_relatorio_mapeado") || "{}")

document.getElementById("headline").innerHTML = data.headline || "Relatório Nexora"
document.getElementById("sub").innerText = data.coverSub || ""
document.getElementById("summary").innerText = data.executiveSummary || ""
document.getElementById("root").innerText = data.rootCause || ""

document.getElementById("metrics").innerHTML =
(data.metrics||[]).map(m => `
<div class="metric">
  <h3>${m.title}</h3>
  <div class="score ${m.level}">${m.score}</div>
  <p>${m.description}</p>
</div>`).join("")

document.getElementById("actions").innerHTML =
(data.actions||[]).map((a,i)=>`
<div class="action">
  <div class="action-num">${i+1}</div>
  <div>
    <strong>${a.title}</strong>
    <p>${a.description}</p>
  </div>
</div>`).join("")
</script>

</body>
</html>
